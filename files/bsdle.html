<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>BSdle</title>
<link rel="icon" type="image/png" href="melodie.png">
<style>

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
@font-face{font-family:'Nougat';src:url('Nougat.ttf') format('truetype');font-weight:400;font-display:swap}
@font-face{font-family:'Nunito';src:url('Nunito.ttf') format('truetype');font-weight:100 900;font-display:swap}

:root{
  --bg:#0b1622;--bg2:#12202f;--bg3:#1a2d40;--bg4:#223550;
  --accent:#ffd000;--text:#e8edf4;--text2:#6e8fa8; 
  --accent2: #ff2dd1;--text:#e8edf4;--text2:#6e8fa8;
  --green:#27ae60;--red:#c0392b;--orange:#d68910;
  --border:#1e3248;--radius:14px;--shadow:0 6px 28px rgba(0,0,0,.55);
}
html{scroll-behavior:smooth}
body{
  font-family:'Nunito',sans-serif;font-size:15px;color:var(--text);
  min-height:100vh;overflow-x:hidden;
  background:#0b1622;
}

.bg-overlay{
  position:fixed;inset:0;z-index:-1;
  background:url('hb.jpg') center/cover no-repeat;
  filter:brightness(.3) blur(2px) saturate(1.4);
  animation:bgDrift 22s ease-in-out infinite;
}
@keyframes bgDrift{
  0%  {transform:scale(1.07) translate(0,0)}
  20% {transform:scale(1.07) translate(-0.9%,-0.5%)}
  45% {transform:scale(1.07) translate(0.6%,-0.9%)}
  70% {transform:scale(1.07) translate(0.9%,0.4%)}
  100%{transform:scale(1.07) translate(0,0)}
}
.bg-base{position:fixed;inset:0;z-index:-3;background:#0b1622}
.bg-solid{position:fixed;inset:0;z-index:-1;background:rgba(11,22,34,.72)}

.header{
  background:linear-gradient(180deg,rgba(6,12,22,.97) 0%,rgba(12,24,38,.93) 100%);
  border-bottom:2px solid rgba(255,208,0,.2);
  padding:26px 20px 18px;text-align:center;
}
.header-logo{
  font-family:'Nougat',cursive;
  font-size:clamp(2.4rem,7vw,3.8rem);
  color:var(--accent);letter-spacing:6px;
  text-shadow:0 0 40px rgba(255,208,0,.4),0 3px 0 #6a4a00;
  line-height:1;
}
.header-sub{color:var(--text2);font-size:.82rem;margin-top:6px;font-weight:700;letter-spacing:1px}

.tabs{
  display:flex;justify-content:center;flex-wrap:wrap;
  gap:10px;padding:16px;
  background:rgba(12,24,38,.92);border-bottom:1px solid var(--border);
  backdrop-filter:blur(8px);
}
.tab{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:13px 18px;min-width:92px;cursor:pointer;
  border-radius:16px;border:2px solid var(--border);
  background:var(--bg3);transition:all .2s;position:relative;
  user-select:none;
}
.tab:hover{border-color:rgba(255,208,0,.5);transform:translateY(-1px)}
.tab.active{border-color:var(--accent);background:rgba(255,208,0,.07);box-shadow:0 0 18px rgba(255,208,0,.12)}
.tab.done{border-color:var(--green);background:rgba(39,174,96,.07)}
.tab-shine{
  position:absolute;top:5px;right:5px;width:7px;height:7px;
  border-radius:50%;background:var(--accent);
  box-shadow:0 0 8px var(--accent);
  opacity:0;
}
.tab.active .tab-shine{opacity:1;animation:pulse 1.4s ease-in-out infinite}
.tab-emoji{font-size:1.6rem;line-height:1}
.tab-label{font-size:.7rem;font-weight:900;color:var(--text2);letter-spacing:.5px;text-transform:uppercase}
.tab.active .tab-label{color:var(--accent)}
.tab.done .tab-label{color:var(--green)}
.tab-streak{font-size:.72rem;font-weight:800;color:var(--text2)}
.tab.active .tab-streak{color:var(--accent)}

.game-area{max-width:980px;margin:0 auto;padding:22px 14px 80px}

.mode-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:14px;flex-wrap:wrap;gap:8px;
}
.mode-title{font-family:'Nougat',cursive;font-size:1.4rem;color:var(--accent)}
.wrong-badge{
  display:inline-flex;align-items:center;gap:4px;
  background:rgba(192,57,43,.18);color:var(--red);
  padding:4px 12px;border-radius:20px;font-size:.82rem;font-weight:800;
}

.rotation-info{
  background:rgba(18,32,47,.8);border:1px solid var(--border);
  border-left:3px solid var(--accent2);border-radius:8px;
  padding:9px 14px;margin-bottom:14px;
  font-size:.78rem;color:var(--text2);font-weight:700;
}
.rotation-info b{color:var(--accent)}

.search-wrap{position:relative;margin-bottom:12px}
.search-input{
  width:100%;padding:13px 18px;
  background:rgba(18,32,47,.9);border:2px solid var(--border);
  border-radius:var(--radius);color:var(--text);
  font-family:'Nunito',sans-serif;font-size:1rem;font-weight:700;
  outline:none;transition:border-color .2s,box-shadow .2s;
}
.search-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(255,208,0,.1)}
.search-input::placeholder{color:var(--text2);font-weight:600}
.search-input:disabled{opacity:.45;cursor:not-allowed}
.ac-list{
  position:absolute;top:calc(100% + 5px);left:0;right:0;
  background:var(--bg2);border:2px solid var(--accent);
  border-radius:var(--radius);max-height:220px;overflow-y:auto;
  z-index:200;display:none;box-shadow:var(--shadow);
}
.ac-list.open{display:block}
.ac-item{padding:8px 14px;cursor:pointer;font-weight:700;transition:background .1s;display:flex;align-items:center;gap:10px;width:100%;}
.ac-icon{width:32px;height:32px;object-fit:contain;flex-shrink:0;border-radius:50%;background:rgba(255,255,255,.06)}
.guess-icon{width:28px;height:28px;object-fit:contain;flex-shrink:0;border-radius:50%;background:rgba(255,255,255,.06)}
.ac-item:hover,.ac-item.hi{background:var(--bg4);color:var(--accent)}

.banner{border-radius:var(--radius);padding:20px 22px;margin-bottom:16px;text-align:center}
.banner-win{background:rgba(39,174,96,.12);border:2px solid rgba(39,174,96,.3)}
.banner-lose{background:rgba(192,57,43,.1);border:2px solid rgba(192,57,43,.25)}
.banner h2{font-family:'Nougat',cursive;font-size:1.7rem}
.banner-win h2{color:var(--green)}
.banner-lose h2{color:var(--red)}
.banner p{color:var(--text2);margin-top:5px;font-weight:700;font-size:.88rem}
.banner p strong{color:var(--text)}
.next-btn{
  display:block;width:100%;margin-top:12px;
  padding:14px 20px;border-radius:var(--radius);
  background:linear-gradient(135deg,rgba(255,208,0,.15),rgba(255,153,0,.12));
  border:2px solid rgba(255,208,0,.35);
  color:var(--accent);font-family:'Nunito',sans-serif;
  font-size:1rem;font-weight:900;cursor:pointer;transition:all .2s;
}
.next-btn:hover{background:linear-gradient(135deg,rgba(255,208,0,.25),rgba(255,153,0,.2));transform:translateY(-1px)}

.hints-bar{display:flex;justify-content:flex-end;margin-bottom:10px}
.hints-toggle{
  padding:6px 16px;border-radius:20px;cursor:pointer;
  font-family:'Nunito',sans-serif;font-size:.78rem;font-weight:800;
  transition:all .2s;border:1px solid var(--border);background:var(--bg3);color:var(--text2);
}
.hints-toggle.on{background:rgba(255,208,0,.1);color:var(--accent);border-color:rgba(255,208,0,.3)}

.table-outer{
  position:relative;border-radius:var(--radius);
  border:1px solid var(--border);box-shadow:var(--shadow);
  background:rgba(12,24,38,.7);
  margin:0;
}
.table-wrap{
  overflow-x:auto;border-radius:var(--radius);
  scrollbar-width:thin;scrollbar-color:var(--accent) var(--bg3);
}
.table-wrap::-webkit-scrollbar{height:6px}
.table-wrap::-webkit-scrollbar-track{background:var(--bg3)}
.table-wrap::-webkit-scrollbar-thumb{background:var(--accent);border-radius:3px}


.stats-table{width:100%;border-collapse:separate;border-spacing:0;min-width:520px}
.stats-table thead th{
  background:rgba(26,45,64,.95);padding:10px 10px;
  font-size:.68rem;text-transform:uppercase;letter-spacing:.6px;
  color:var(--text2);white-space:nowrap;text-align:center;
  font-weight:900;border-bottom:1px solid var(--border);
}
.stats-table thead th:first-child{text-align:center;padding:10px 6px;width:52px;min-width:52px;}
.stats-table tbody td{
  padding:0;text-align:center;font-size:.82rem;font-weight:800;
  border-bottom:1px solid rgba(30,50,72,.6);
  position:relative;height:52px;
}
.stats-table tbody td:first-child{
  text-align:center;padding:0 6px;width:52px;min-width:52px;max-width:52px;
}
.name-cell{position:relative;display:inline-flex;align-items:center;justify-content:center;cursor:default;}
.name-cell-tooltip{
  position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);
  background:var(--bg4);border:1px solid var(--border);
  border-radius:6px;padding:3px 8px;
  font-size:.72rem;font-weight:800;color:var(--text);
  white-space:nowrap;pointer-events:none;
  opacity:0;transition:opacity .12s;z-index:50;
}
.name-cell:hover .name-cell-tooltip{opacity:1;}
.tbl-icon{width:40px;height:40px;object-fit:contain;flex-shrink:0;border-radius:50%;transition:transform .15s;}
.name-cell:hover .tbl-icon{transform:scale(1.12);}
.cell-inner{
  position:relative;display:flex;align-items:center;justify-content:center;
  height:100%;padding:8px 10px;overflow:hidden;
}
.cell-bg-arr{
  position:absolute;font-size:5.5rem;opacity:.22;
  top:50%;left:50%;transform:translate(-50%,-50%);
  line-height:1;pointer-events:none;user-select:none;
  font-style:normal;font-weight:900;
  -webkit-text-stroke:2px currentColor;
}
.cell-txt{position:relative;z-index:1;font-weight:900;font-size:.82rem}

.stats-table tbody tr:last-child td{border-bottom:none}
.cell-correct{background:rgba(39,174,96,.28)!important;color:#5fffa3}
.cell-wrong{background:rgba(192,57,43,.25)!important;color:#ffaaaa}
.cell-partial{background:rgba(214,137,16,.25)!important;color:#ffd580}
.cell-arrow{font-size:.85em;margin-left:3px}
.cell-hidden{background:var(--bg3)!important;color:transparent!important;transition:background .3s,color .3s}

@keyframes cellReveal{
  0%{opacity:0;transform:rotateX(90deg) scale(.85)}
  55%{transform:rotateX(-6deg)}
  100%{opacity:1;transform:rotateX(0deg) scale(1)}
}
.cell-anim{animation:cellReveal .55s cubic-bezier(.34,1.56,.64,1) forwards;opacity:0}

.info-btn{
  display:inline-flex;align-items:center;justify-content:center;
  width:13px;height:13px;background:var(--accent);color:#000;
  border-radius:50%;font-size:.58rem;font-weight:900;cursor:default;
  margin-left:4px;vertical-align:middle;flex-shrink:0;user-select:none;
}

#tooltip{
  position:fixed;background:var(--bg4);border:1px solid var(--border);
  border-radius:8px;padding:10px 14px;font-size:.78rem;max-width:280px;
  z-index:9999;color:var(--text);box-shadow:var(--shadow);
  display:none;line-height:1.5;font-weight:600;pointer-events:none;
}

.fact-card{
  background:rgba(18,32,47,.85);border:1px solid var(--border);border-left:4px solid var(--accent2);
  border-radius:var(--radius);padding:24px;margin-bottom:16px;
  box-shadow:var(--shadow);
}
.fact-text{font-size:1.1rem;font-weight:700;line-height:1.7}
.fact-unknown{color:var(--accent);background:rgba(255,208,0,.1);padding:1px 7px;border-radius:4px}
.fact-revealed{color:var(--green);background:rgba(39,174,96,.12);padding:1px 7px;border-radius:4px;font-weight:900}
.hints-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
.hint-pill{
  display:inline-flex;align-items:center;gap:6px;
  padding:5px 13px;border-radius:20px;font-size:.76rem;font-weight:800;
  background:var(--bg3);color:var(--text2);border:1px solid var(--border);transition:all .3s;
}
.hint-pill.shown{background:rgba(255,208,0,.1);color:var(--accent);border-color:rgba(255,208,0,.25)}
.hint-pill img{width:18px;height:18px;object-fit:contain;flex-shrink:0;}

.vl-card{
  background:rgba(18,32,47,.85);border:1px solid var(--border);border-left:4px solid var(--accent2);
  border-radius:var(--radius);padding:26px;margin-bottom:16px;box-shadow:var(--shadow);
}
.vl-label{color:var(--text2);font-size:.68rem;font-weight:900;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.vl-text{font-family:'Nougat',cursive;font-size:clamp(1.2rem,3vw,1.55rem);line-height:1.45;color:var(--text)}
.audio-note{color:var(--text2);font-size:.76rem;font-weight:700;margin-top:10px}
.audio-wrap{margin-top:14px}
.audio-wrap audio{width:100%;border-radius:8px}

.emoji-card{
  background:rgba(18,32,47,.85);border:1px solid var(--border);border-left:4px solid var(--accent2);
  border-radius:var(--radius);padding:28px;margin-bottom:16px;text-align:center;box-shadow:var(--shadow);
}
.emoji-display{font-size:clamp(2rem,6vw,3rem);letter-spacing:10px;line-height:1.5}
.emoji-sub{color:var(--text2);font-size:.76rem;font-weight:700;margin-top:10px}

.img-card{
  background:rgba(18,32,47,.85);border:1px solid var(--border);border-left:4px solid var(--accent2);
  border-radius:var(--radius);padding:18px;margin-bottom:16px;box-shadow:var(--shadow);
}
.img-grid{display:grid;gap:14px;grid-template-columns:1fr;max-width:400px;margin:0 auto}
.img-slot{
  background:var(--bg3);border-radius:10px;overflow:hidden;
  display:flex;align-items:center;justify-content:center;aspect-ratio:2010/1250;
}
.img-slot img{width:100%;height:100%;object-fit:contain}
.img-placeholder{color:var(--text2);font-size:.82rem;font-weight:700;text-align:center;padding:12px}
.img-locked{
  display:flex;align-items:center;justify-content:center;flex-direction:column;
  gap:8px;background:var(--bg3);border-radius:10px;aspect-ratio:2010/1250;
  color:var(--text2);font-size:.8rem;font-weight:700;text-align:center;padding:12px;
}
.img-label{text-align:center;color:var(--text2);font-size:.68rem;font-weight:900;text-transform:uppercase;margin-top:5px;letter-spacing:.5px}

.guess-list{display:flex;flex-direction:column;gap:7px;margin-top:8px}
.gear-card{background:rgba(18,32,47,.85);border:1px solid var(--border);border-left:4px solid var(--accent2);border-radius:var(--radius);
  padding:22px 18px;text-align:center;max-width:380px;margin:0 auto 16px;}
.gear-type-label{font-weight:900;font-size:1rem;letter-spacing:.5px;
  color:var(--accent);margin-bottom:14px;text-transform:uppercase;}
.gear-img-wrap{display:flex;justify-content:center;align-items:center;
  min-height:130px;margin-bottom:12px;}
.gear-img{width:190px;height:190px;object-fit:contain;}
.gear-sub{color:var(--text2);font-size:.8rem;margin-top:8px;}
.guess-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 15px;border-radius:9px;font-weight:800;font-size:.9rem;
  animation:fadeUp .2s ease;
}
.guess-item.ok{background:rgba(39,174,96,.12);border:1px solid rgba(39,174,96,.25);color:var(--green)}
.guess-item.fail{background:rgba(192,57,43,.08);border:1px solid rgba(192,57,43,.18);color:var(--red)}

.confetti-overlay-dead{
  position:fixed;inset:0;z-index:9990;pointer-events:none;overflow:hidden;
}
@keyframes gentleSpin{
  0%  {transform:rotate(0deg) scale(1)}
  20% {transform:rotate(-1.8deg) scale(1.025)}
  45% {transform:rotate(1.5deg) scale(1.04)}
  65% {transform:rotate(-1deg) scale(1.028)}
  82% {transform:rotate(.5deg) scale(1.012)}
  93% {transform:rotate(-.2deg) scale(1.004)}
  100%{transform:rotate(0deg) scale(1)}
}
@keyframes flashWin{
  0%{opacity:.55}
  100%{opacity:0}
}
.flash-win{
  position:fixed;inset:0;z-index:9989;pointer-events:none;
  background:radial-gradient(circle at center,rgba(255,208,0,.18) 0%,rgba(39,174,96,.1) 55%,rgba(0,0,0,.45) 100%);
  animation:flashWin .85s ease forwards;
}
@keyframes confettiFall{
  0%{transform:translateY(0) rotate(0deg);opacity:1}
  100%{transform:translateY(115vh) rotate(540deg);opacity:0}
}
@keyframes confettiFallR{
  0%{transform:translateY(0) rotate(0deg);opacity:1}
  100%{transform:translateY(115vh) rotate(-540deg);opacity:0}
}
.confetti{
  position:absolute;
  animation:confettiFall linear forwards;
  border-radius:50%;
  overflow:hidden;
  pointer-events:none;
}
.confetti.rev{animation-name:confettiFallR;}
.confetti img{
  width:100%;height:100%;
  object-fit:contain;
  display:block;
}
@keyframes bounce-in{
  0%{transform:scale(.3);opacity:0}
  60%{transform:scale(1.1)}
  80%{transform:scale(.95)}
  100%{transform:scale(1);opacity:1}
}

.brawler-panel-btn{
  position:fixed;top:14px;left:14px;z-index:300;
  background:var(--bg3);border:1px solid var(--border);
  border-radius:8px;padding:7px 10px;font-size:.72rem;font-weight:800;
  color:var(--text2);cursor:pointer;
  transition:color .15s,border-color .15s;user-select:none;
  white-space:nowrap;overflow:hidden;
}
.brawler-panel-btn:hover{color:var(--accent);border-color:var(--accent);}
@media(max-width:480px){
  .brawler-panel-btn span.btn-label{display:none;}
  .brawler-panel-btn{padding:7px 9px;}
  .stats-btn span.btn-label{display:none;}
  .stats-btn{padding:7px 9px;}
}
.brawler-panel-overlay{
  display:none;position:fixed;inset:0;z-index:9995;
  background:rgba(0,0,0,.7);backdrop-filter:blur(4px);
  overflow-y:auto;padding:24px 16px 60px;
}
.brawler-panel-overlay.open{display:block;}
.brawler-panel-box{
  max-width:760px;margin:0 auto;
  background:var(--bg2);border:1px solid var(--border);
  border-radius:14px;padding:20px 18px;
}
.brawler-panel-title{
  font-size:1.1rem;font-weight:900;color:var(--accent);
  margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;
}
.brawler-panel-close{
  cursor:pointer;font-size:1.3rem;color:var(--text2);
  line-height:1;padding:2px 8px;border-radius:6px;transition:color .15s;
}
.brawler-panel-close:hover{color:var(--accent);}
.sort-toggle{
  display:flex;gap:0;border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:16px;
}
.sort-btn{
  flex:1;padding:7px 0;font-size:.75rem;font-weight:800;cursor:pointer;
  background:var(--bg3);color:var(--text2);border:none;transition:all .2s;
  letter-spacing:.5px;text-transform:uppercase;
}
.sort-btn.active{background:rgba(255,208,0,.12);color:var(--accent);}
.brawler-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
.rarity-section{margin-bottom:22px;}
.rarity-label{
  font-size:.7rem;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--text2);margin-bottom:8px;padding-bottom:4px;
  border-bottom:1px solid var(--border);
}
.brawler-chip{
  position:relative;width:56px;height:56px;cursor:default;
  display:flex;align-items:center;justify-content:center;
  border-radius:12px;background:var(--bg3);border:1px solid var(--border);
  transition:border-color .15s,transform .15s;
}
.brawler-chip:hover{border-color:var(--accent);transform:scale(1.08);}
.brawler-chip img{width:44px;height:44px;object-fit:contain;border-radius:50%;}
.brawler-chip-name{
  position:absolute;bottom:calc(100% + 5px);left:50%;transform:translateX(-50%);
  background:var(--bg4);border:1px solid var(--border);
  border-radius:6px;padding:3px 8px;
  font-size:.72rem;font-weight:800;color:var(--text);
  white-space:nowrap;pointer-events:none;
  opacity:0;transition:opacity .12s;z-index:10;
}
.brawler-chip:hover .brawler-chip-name{opacity:1;}
.map-card{
  background:rgba(18,32,47,.85);border:1px solid var(--border);border-left:4px solid var(--accent2);
  border-radius:var(--radius);padding:18px;margin-bottom:16px;
  box-shadow:var(--shadow);
}
.map-viewport{
  width:100%;max-width:420px;aspect-ratio:1/1;
  border-radius:10px;background:var(--bg3);
  margin:0 auto;display:block;
}
.map-canvas{
  display:block;width:100%;height:100%;
  border-radius:10px;
  -webkit-user-select:none;user-select:none;
}
.stats-btn{
  position:fixed;top:14px;right:14px;z-index:300;
  display:inline-flex;align-items:center;gap:5px;
  padding:7px 13px;border-radius:8px;cursor:pointer;
  font-family:'Nunito',sans-serif;font-size:.78rem;font-weight:800;
  background:var(--bg3);color:var(--text2);border:1px solid var(--border);

}

.stats-overlay{
  display:none;position:fixed;inset:0;z-index:9997;
  background:rgba(0,0,0,.75);backdrop-filter:blur(4px);

}

.stats-box{

  display:flex;justify-content:space-between;align-items:center;
  padding:13px 4px;border-bottom:1px solid var(--border);

.stats-label{font-size:.88rem;font-weight:700;color:var(--text2);}

.report-btn{
  position:fixed;bottom:14px;right:16px;z-index:500;
  background:rgba(18,32,47,.6);border:1px solid rgba(255,255,255,.08);
  border-radius:50%;width:26px;height:26px;
  display:flex;align-items:center;justify-content:center;
  font-size:.85rem;cursor:pointer;color:rgba(255,255,255,.25);
  transition:color .2s,border-color .2s;
}

.report-tip{
  position:fixed;bottom:46px;right:16px;z-index:501;
  background:var(--bg4);border:1px solid var(--border);border-radius:8px;
  padding:10px 14px;font-size:.76rem;max-width:240px;color:var(--text2);
  font-weight:700;line-height:1.5;display:none;pointer-events:none;
  box-shadow:var(--shadow);text-align:left;
}
.report-btn:hover + .report-tip{display:block}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

@keyframes fadeUp{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{box-shadow:0 0 6px var(--accent)}50%{box-shadow:0 0 14px var(--accent)}}

@media(max-width:540px){
  .tab{min-width:72px;padding:11px 12px}
  .tab-emoji{font-size:1.3rem}
  .fact-text{font-size:.95rem}
  .stats-table thead th{font-size:.58rem;padding:8px 6px;}
  .stats-table tbody td{font-size:.72rem;height:44px;}
  .cell-inner{padding:6px 6px;}
  .tbl-icon{width:34px;height:34px;}
}

</style>
</head>
<body>
<div class="bg-base"></div>
<div class="bg-overlay"></div>
<div class="bg-solid"></div>
<div id="app"><div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#ffd000;font-family:sans-serif;font-size:1.2rem">⚡ Loading BSdle…</div></div>
<script>
let BRAWLERS = {};
let MAPS = {};

function _initGame([stats, maps]){
  BRAWLERS = stats;
  MAPS = maps;
  ANSWERS = getDailyAnswers();
  loadState();
  render();
}

function _showLoadError(){
  document.getElementById('app').innerHTML =
    '<div style="color:#e74c3c;font-family:sans-serif;padding:30px;max-width:520px;margin:80px auto;' +
    'background:rgba(0,0,0,.6);border-radius:12px">' +
    '<h2>Impossible to load data</h2>' +
    '<p>Use <b>VS Code + Live Server</b> to open the game.</p></div>';
}

Promise.all([
  fetch('stats.json').then(r=>{ if(!r.ok) throw new Error('stats'); return r.json(); }),
  fetch('maps.json').then(r=>{ if(!r.ok) throw new Error('maps'); return r.json(); })
]).then(_initGame).catch(_showLoadError);

const MODES = ['classic','gear','fact','voiceline','emoji','image','map'];
const MODE_META = {
  classic:   {label:'Classic',   emoji:'🔃', color:'#27ae60'},
  gear:      {label:'Gear',      emoji:'⚙️', color:'#e67e22'},
  fact:      {label:'Fact',      emoji:'📖', color:'#f1c40f'},
  voiceline: {label:'Voiceline', emoji:'🔊', color:'#3498db'},
  emoji:     {label:'Emoji',     emoji:'🧐', color:'#9b59b6'},
  image:     {label:'Image',     emoji:'🖼️', color:'#e74c3c'},
  map:       {label:'Map',       emoji:'🗺️', color:'#16a085'},
};
const SEEDS = {classic:1337,gear:5512,fact:4721,voiceline:9203,emoji:6614,image:2958,map:7731};
const GEAR_LABELS = {'1':'Gadget 1','2':'Gadget 2','3':'Star Power 1','4':'Star Power 2','5':'Hypercharge'};

const COL_GROUPS = [
  ['gender'],
  ['class','rarity','world'],
  ['hp','mvt'],
  ['damage_per_projectile','full_damage','projectiles'],
  ['range','damage_type'],
  ['reload_speed','ammo'],
  ['ult_charge','hc_multiplier','hitbox', 'passive_ability'],
  ['release','nb_skins','gadget_cd'],
];
const COL_LABELS = {
  gender:'Gender',class:'Class',rarity:'Rarity',world:'World',
  hp:'HP',mvt:'Speed',
  damage_per_projectile:'Dmg/Proj',full_damage:'Full Dmg',projectiles:'Projectiles',
  range:'Range',damage_type:'Dmg Type',
  reload_speed:'Reload',ammo:'Ammo',
  ult_charge:'Ult',hc_multiplier:'HC %',hitbox:'Hitbox',passive_ability:'Passive',
  release:'Release',nb_skins:'Skins',
  gadget_cd_min:'Gadget CD↓',gadget_cd_max:'Gadget CD↑',
};
const COL_INFO = {
  gender:'Gender of the brawler',
  class:'Role: Damage Dealer, Tank, Support, Controller, Marksman, Assassin…',
  rarity:'Rarity tier: Rare, Super Rare, Epic, Mythic, Legendary, Ultra Legendary…',
  world:'Thematic universe in Brawl Stars lore',
  hp:'Base health points at power level 11',
  mvt:'Movement speed category derived from internal value',
  damage_per_projectile:'Damage per projectile shown in-game (or per tick for Willow, Byron…)',
  full_damage:'Max damage of one normal attack — normal hitbox, no movement, no buffs. Per second for continuous attackers (Amber, Moe…).',
  projectiles:'Number of projectiles per attack, or per second for continuous attackers',
  range:'Attack range category in tiles',
  damage_type:'single: 1 target | spread: multiple projectiles | pierce: goes through enemies | splash: AoE (explosion, through Mina shield)',
  reload_speed:'Reload speed category. Arrow ↑ = faster reload (lower time)',
  ammo:'Max ammo capacity',
  ult_charge:'Number of attacks needed to fully charge the super',
  hc_multiplier:'Hypercharge multiplier in %',
  hitbox:'Collision size (Normal = 120px, Large = 145px)',
  passive_ability:'Whether the brawler has a passive ability',
  release:'Year the brawler was released',
  nb_skins:'Total number of skins',
  gadget_cd_min:'Shortest cooldown between both gadgets (seconds)',
  gadget_cd_max:'Longest cooldown between both gadgets (seconds)',
};

function lcg(seed){
  let s=(seed|0)>>>0;
  return()=>{s=((Math.imul(s,1664525)+1013904223)>>>0);return s/4294967296};
}
function seededShuffle(arr,seed){
  const a=[...arr],rng=lcg(seed);
  for(let i=a.length-1;i>0;i--){const j=Math.floor(rng()*(i+1));[a[i],a[j]]=[a[j],a[i]]}
  return a;
}
function dayIndex(){
  const n=new Date();
  return Math.floor(Date.UTC(n.getUTCFullYear(),n.getUTCMonth(),n.getUTCDate())/86400000);
}

function _dayHash(di,slot){
  let h=((di^(di>>>4))*0x45d9f3b+slot*2654435761)>>>0;
  h=((h^(h>>>15))*0x1b873593)>>>0;
  h=(h^(h>>>13))>>>0;
  return h/4294967296;
}
function getDailyCols(){
  const di=dayIndex();
  return COL_GROUPS.map((group,gi)=>{
    const pick=group[Math.floor(_dayHash(di,gi*7+1)*group.length)];
    if(pick==='gadget_cd')return _dayHash(di,gi*7+2)<0.5?'gadget_cd_min':'gadget_cd_max';
    return pick;
  });
}

const HIST_WIN={classic:20,gear:20,fact:20,voiceline:20,emoji:20,image:20,map:12};
const HIST_KEY='bsdle_hist_v1';

function _loadHist(){
  try{return JSON.parse(localStorage.getItem(HIST_KEY))||{};}catch(e){return{};}
}
function _saveHist(hist){
  try{localStorage.setItem(HIST_KEY,JSON.stringify(hist));}catch(e){}
}
function _recentAnswers(hist,mode,di){
  const win=HIST_WIN[mode]||20;
  const entries=hist[mode]||[];
  return new Set(entries.filter(e=>e.d!==di&&di-e.d<win).map(e=>e.a));
}
function _recordAnswer(hist,mode,di,answer){
  if(!hist[mode])hist[mode]=[];
  const win=HIST_WIN[mode]||20;
  hist[mode]=hist[mode].filter(e=>di-e.d<win);
  const existing=hist[mode].find(e=>e.d===di);
  if(existing)existing.a=answer;
  else hist[mode].push({d:di,a:answer});
}

function getDailyAnswers(){
  const di=dayIndex();
  const all=Object.keys(BRAWLERS);
  const pools={
    classic: all.filter(b=>BRAWLERS[b].Stats),
    gear:    all.filter(b=>BRAWLERS[b].Gears&&Object.keys(BRAWLERS[b].Gears).length>0),
    fact:    all.filter(b=>BRAWLERS[b].Fact?.length>0),
    voiceline:all.filter(b=>BRAWLERS[b].Voicelines?.length>0),
    emoji:   all.filter(b=>BRAWLERS[b].Emojis?.length>0),
    image:   all.filter(b=>BRAWLERS[b].Images),
    map:     Object.keys(MAPS),
  };
  /* Pure deterministic selection — same on every device for same date */
  const picked=new Set();const ans={};
  MODES.forEach(m=>{
    const sh=seededShuffle(pools[m],SEEDS[m]);
    let idx=di%sh.length,sf=0;
    while(picked.has(sh[idx])&&sf++<sh.length)idx=(idx+1)%sh.length;
    ans[m]=sh[idx];picked.add(sh[idx]);
  });
  /* Record history asynchronously — purely informational, never changes answers */
  const hist=_loadHist();
  MODES.forEach(m=>_recordAnswer(hist,m,di,ans[m]));
  _saveHist(hist);
  return ans;
}

function getDailyGearKey(){
  const brawler=BRAWLERS[ANSWERS.gear];
  if(!brawler||!brawler.Gears)return'1';
  const keys=Object.keys(brawler.Gears);
  const idx=lcg(dayIndex()*3847+7193)();
  return keys[Math.floor(idx*keys.length)];
}

function speedLabel(v){
  if(v>=820)return'Very Fast';if(v===770)return'Fast';
  if(v===720)return'Normal';if(v===650||v===620)return'Slow';return'Very Slow';
}
function rangeLabel(v){if(v>9)return'Very Long';if(v>=7)return'Long';if(v>=4)return'Normal';return'Short'}
function reloadLabel(v){
  if(v<=1.3)return'Very Fast';if(v<=1.4)return'Fast';
  if(v<=1.9)return'Normal';if(v<=2.2)return'Slow';return'Very Slow';
}
function hitboxLabel(v){return v===145?'Large':'Normal'}

function getStatValue(brawler,stat){
  if(stat==='gadget_cd_min'||stat==='gadget_cd_max'){
    const cd=brawler.Stats.gadget_cd;if(!cd)return null;
    const vals=Object.values(cd).map(Number);
    return stat==='gadget_cd_min'?Math.min(...vals):Math.max(...vals);
  }
  return brawler.Stats[stat];
}
function fmt(stat,val){
  if(val===null||val===undefined)return'—';
  switch(stat){
    case'hp':return val.toLocaleString();
    case'gender':return val[0].toUpperCase()+val.slice(1);
    case'rarity':case'class':case'world':
      return val.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
    case'damage_type':return val[0].toUpperCase()+val.slice(1);
    case'hitbox':return hitboxLabel(val);
    case'mvt':return speedLabel(val);
    case'range':return rangeLabel(val);
    case'reload_speed':return reloadLabel(val);
    case'hc_multiplier':return val+'%';
    case'ult_charge':return Number.isInteger(val)?String(val):val.toFixed(2);
    case'gadget_cd_min':case'gadget_cd_max':return val+'s';
    case'nb_skins':return val+' skins';
    case'passive_ability':return val?'Yes':'No';
    default:return String(val);
  }
}
function cmpStat(stat,gv,tv){
  if(gv===null||gv===undefined||tv===null||tv===undefined)return{cls:'wrong',arrow:''};
  const cats=['gender','rarity','class','damage_type','passive_ability','world','hitbox'];
  if(cats.includes(stat))return{cls:gv===tv?'correct':'wrong',arrow:''};
  if(stat==='mvt'){
    if(gv===tv)return{cls:'correct',arrow:''};
    return{cls:speedLabel(gv)===speedLabel(tv)?'partial':'wrong',arrow:tv>gv?'↑':'↓'};
  }
  if(stat==='range'){
    if(gv===tv)return{cls:'correct',arrow:''};
    return{cls:rangeLabel(gv)===rangeLabel(tv)?'partial':'wrong',arrow:tv>gv?'↑':'↓'};
  }
  if(stat==='reload_speed'){
    if(gv===tv)return{cls:'correct',arrow:''};
    return{cls:reloadLabel(gv)===reloadLabel(tv)?'partial':'wrong',arrow:tv<gv?'↑':'↓'};
  }
  return{cls:gv===tv?'correct':'wrong',arrow:tv>gv?'↑':tv<gv?'↓':''};
}

// Strip "images/" prefix → file is at brawlername/atk.png etc.
function imgSrc(p){return p?p.replace(/^images\//,''):null}
function brawlerIcon(name){const b=BRAWLERS[name];return b&&b.Icon?b.Icon:'';}
// Strip "audio/" prefix → file is at brawlername/sound.ogg etc.
function audioSrc(p){return p?p.replace(/^audio\//,''):null}

/* Map of rowIdx → {done, g, cols} for independent DOM animation */
const _classicAnims = new Map();
let _skipReapply=false;

const _confettiIntervals={};
const _confettiColors=['#ffd000','#ff6b35','#27ae60','#3498db','#9b59b6','#e74c3c','#f1c40f','#00d2ff'];

function _getConfettiIcons(){
  const all=Object.keys(BRAWLERS).filter(b=>BRAWLERS[b].Icon&&BRAWLERS[b].Stats);
  if(!all.length)return null;
  const shuffled=[...all].sort(()=>Math.random()-.5);
  return shuffled.slice(0,shuffled.length);
}
let _cachedConfettiIcons=null;
function _spawnBatch(overlay){
  if(!_cachedConfettiIcons)_cachedConfettiIcons=_getConfettiIcons();
  const icons=_cachedConfettiIcons;
  const frag=document.createDocumentFragment();
  for(let i=0;i<16;i++){
    const p=document.createElement('div');
    p.className='confetti';
    const dur=2+Math.random()*2.5;
    const vmin=Math.min(window.innerWidth,window.innerHeight);
    const sz=Math.round((0.06+Math.random()*0.05)*vmin);
    if(Math.random()>.5)p.classList.add('rev');
    const topStart=-sz-Math.round(Math.random()*60);
    p.style.cssText=
      'left:'+Math.round(Math.random()*100)+'%;'+
      'top:'+topStart+'px;'+
      'width:'+sz+'px;height:'+sz+'px;'+
      'animation-duration:'+dur+'s;';
    if(icons&&icons.length){
      const icon=icons[Math.floor(Math.random()*icons.length)];
      const img=document.createElement('img');
      img.src=BRAWLERS[icon].Icon;
      img.alt='';
      p.appendChild(img);
    } else {
      p.style.background=_confettiColors[Math.floor(Math.random()*_confettiColors.length)];
    }
    frag.appendChild(p);
    setTimeout(()=>{if(p.parentNode)p.remove();},(dur+0.1)*1000);
  }
  overlay.appendChild(frag);
}

function startConfetti(mode){
  stopConfetti(mode);
  const overlay=document.createElement('div');
  overlay.id='confetti-'+mode;
  overlay.style.cssText='position:fixed;inset:0;pointer-events:none;z-index:9988;overflow:hidden;';
  document.body.appendChild(overlay);
  _spawnBatch(overlay);
  _confettiIntervals[mode]=setInterval(()=>_spawnBatch(overlay),700);
}

function stopConfetti(mode){
  if(_confettiIntervals[mode]){clearInterval(_confettiIntervals[mode]);delete _confettiIntervals[mode];}
  const old=document.getElementById('confetti-'+mode);if(old)old.remove();
}

function stopAllConfetti(){Object.keys(_confettiIntervals).forEach(m=>stopConfetti(m));}

function fireVictory(mode){
  const fl=document.createElement('div');fl.className='flash-win';document.body.appendChild(fl);
  setTimeout(()=>fl.remove(),1000);
  document.body.style.animation='gentleSpin 1.1s ease-in-out';
  setTimeout(()=>{document.body.style.animation=''},800);
  startConfetti(mode);
}

const TODAY=new Date().toISOString().split('T')[0];
let ANSWERS={};  // filled after BRAWLERS loads
let S;
function loadState(){
  let raw=null;
  try{raw=JSON.parse(localStorage.getItem('brawldle_v3'))}catch(e){}
  if(!raw||raw.date!==TODAY){
    S={date:TODAY,activeMode:'classic',
      modes:Object.fromEntries(MODES.map(m=>[m,{guesses:[],won:false,wrong:0,hintsOn:true}]))};
  }else{
    S=raw;
    MODES.forEach(m=>{if(S.modes[m].hintsOn===undefined)S.modes[m].hintsOn=true});
  }
  let sr=null;
  try{sr=JSON.parse(localStorage.getItem('brawldle_streaks'))}catch(e){}
  S.streaks=sr||Object.fromEntries(MODES.map(m=>[m,{cur:0,best:0}]));
  MODES.forEach(m=>{if(!S.streaks[m])S.streaks[m]={cur:0,best:0}});
}
function saveState(){
  const{streaks,...save}=S;
  try{
    localStorage.setItem('brawldle_v3',JSON.stringify(save));
    localStorage.setItem('brawldle_streaks',JSON.stringify(S.streaks));
  }catch(e){}
}
const PERF_KEY='bsdle_perf_v1';
function _loadPerf(){try{return JSON.parse(localStorage.getItem(PERF_KEY))||{};}catch(e){return{};}}
function _savePerf(p){try{localStorage.setItem(PERF_KEY,JSON.stringify(p));}catch(e){}}
function _recordPerf(mode,guesses,won){
  const p=_loadPerf();
  if(!p[mode])p[mode]=[];
  const di=dayIndex();
  /* Avoid duplicate for same day */
  if(p[mode].some(e=>e.d===di))return;
  p[mode].push({d:di,g:guesses,w:won?1:0});
  /* Keep last 60 days */
  p[mode]=p[mode].filter(e=>di-e.d<60).sort((a,b)=>a.d-b.d);
  _savePerf(p);
}

function getNextMode(cur){
  const idx=MODES.indexOf(cur);
  for(let i=1;i<=MODES.length;i++){
    const m=MODES[(idx+i)%MODES.length];
    if(!S.modes[m].won)return m;
  }
  return null;
}

function guess(mode,name){
  const ms=S.modes[mode];
  if(ms.won)return;
  if(ms.guesses.some(g=>g.name===name))return;
  const correct=name===ANSWERS[mode];

  if(mode==='classic'){
    const gb=BRAWLERS[name],tb=BRAWLERS[ANSWERS[mode]];
    const cols=getDailyCols();
    const cmp={};
    cols.forEach(s=>{
      const gv=getStatValue(gb,s),tv=getStatValue(tb,s);
      cmp[s]=(gv!==null&&gv!==undefined&&tv!==null&&tv!==undefined)
        ?cmpStat(s,gv,tv):{cls:'wrong',arrow:''};
    });
    const newIdx=ms.guesses.length;
    ms.guesses.push({name,cmp});
    /* Update guess counter immediately (before animation) */
    const _gc=document.getElementById('classic-guess-count');
    if(_gc){const _n=ms.guesses.length;_gc.textContent=_n+' guess'+(_n!==1?'es':'');}
    /* Mark won immediately for state (prevent further guesses) */
    if(correct){
      ms.won=true;
      S.streaks[mode].cur++;
      if(S.streaks[mode].cur>S.streaks[mode].best)S.streaks[mode].best=S.streaks[mode].cur;
    }
    saveState();
    _classicAnims.set(newIdx, {done:false, g:{name,cmp}, cols});
    const dur=(cols.length+1)*500+400;
    setTimeout(()=>{
      const a=_classicAnims.get(newIdx);if(a)a.done=true;
      /* Make the animated row permanent: remove its special attribute so it stays as-is */
      const animTr=document.querySelector(`tr[data-classic-ri="${newIdx}"]`);
      if(animTr){
        animTr.removeAttribute('data-classic-ri');
        /* Remove animation classes so cells are in their final visual state */
        animTr.querySelectorAll('td').forEach(td=>{
          td.classList.remove('cell-anim','cell-hidden');
          td.style.animationDelay='';
          td.style.opacity='1';
        });
      }

      if(correct){
        _recordPerf(mode,ms.guesses.length,true);
        /* Disable search input directly */
        const inp=document.getElementById('inp-classic');
        if(inp)inp.disabled=true;
        /* Show banner after a tiny extra delay (200ms) so it feels post-reveal */
        setTimeout(()=>{
          if(S.activeMode!==mode)return;
          const banner=document.getElementById('classic-banner');
          if(banner)banner.innerHTML=winBanner('classic');
          fireVictory(mode);
        },200);
      }
    }, dur);
    if(!document.querySelector('.stats-table')){
      /* First guess: need to create the table structure. Suppress reapply since we do it manually. */
      _skipReapply=true;
      render();
      _skipReapply=false;
    }
    _appendClassicRow(newIdx);
  } else {
    ms.guesses.push({name,correct});
    if(!correct)ms.wrong++;
    if(correct){
      ms.won=true;
      S.streaks[mode].cur++;
      if(S.streaks[mode].cur>S.streaks[mode].best)S.streaks[mode].best=S.streaks[mode].cur;
    }
    if(correct)_recordPerf(mode,ms.guesses.length,true);
    saveState();render();
    if(correct)setTimeout(()=>{
      if(S.activeMode===mode)fireVictory(mode);
    },120);
  }
}

function _buildCellInner(bv, s, c){
  const disp=bv!==null&&bv!==undefined?fmt(s,bv):'—';
  const arr=c?.arrow||'';
  const bgArr=arr==='↑'?'▲':arr==='↓'?'▼':'';
  return`<div class="cell-inner">${bgArr?`<span class="cell-bg-arr">${bgArr}</span>`:''}<span class="cell-txt">${esc(disp)}${arr?`<span class="cell-arrow">${arr}</span>`:''}</span></div>`;
}
function _appendClassicRow(ri){
  const anim=_classicAnims.get(ri);
  if(!anim||anim.done)return;
  const tbody=document.querySelector('.stats-table tbody');
  if(!tbody)return;
  const {g,cols}=anim;
  const tr=document.createElement('tr');
  /* Name cell — starts hidden */
  const nameTd=document.createElement('td');
  nameTd.className='cell-hidden';
  nameTd.innerHTML=`<div class="name-cell"><img class="tbl-icon" src="${brawlerIcon(g.name)}" alt=""><span class="name-cell-tooltip">${esc(g.name)}</span></div>`;
  tr.appendChild(nameTd);
  cols.forEach((s,ci)=>{
    const cv=g.cmp[s];
    const bv=getStatValue(BRAWLERS[g.name],s);
    const td=document.createElement('td');
    td.className=`cell-${cv?cv.cls:'wrong'} cell-hidden`;
    td.innerHTML=_buildCellInner(bv,s,cv);
    tr.appendChild(td);
  });
  /* Prepend: newest row at top */
  tr.dataset.classicRi=ri;
  tbody.insertBefore(tr,tbody.firstChild);
  /* Trigger animation next frame so cell-hidden is painted first */
  requestAnimationFrame(()=>{
    const cells=Array.from(tr.querySelectorAll('td'));
    cells.forEach((td,i)=>{
      td.classList.remove('cell-hidden');
      void td.offsetWidth; /* force reflow */
      td.classList.add('cell-anim');
      td.style.animationDelay=(i*0.45)+'s';
    });
  });
}

function validPool(mode){
  const all=Object.keys(BRAWLERS);
  if(mode==='fact')      return all.filter(b=>BRAWLERS[b].Fact&&BRAWLERS[b].Fact.length>0);
  if(mode==='voiceline') return all.filter(b=>'Voicelines' in (BRAWLERS[b]||{})); /* include empty arrays, exclude missing key */
  if(mode==='emoji')     return all.filter(b=>BRAWLERS[b].Emojis&&BRAWLERS[b].Emojis.length>0);
  if(mode==='gear')      return all.filter(b=>BRAWLERS[b].Gears&&Object.keys(BRAWLERS[b].Gears).length>0);
  if(mode==='image')     return all.filter(b=>BRAWLERS[b].Images);
  if(mode==='map')       return Object.keys(MAPS);
  return all.filter(b=>BRAWLERS[b].Stats); // classic + default
}
function _matchedAlias(name, q){
  const aliases=BRAWLERS[name]?.Aliases||[];
  return aliases.find(a=>a.toLowerCase().startsWith(q))||null;
}
function acFilter(mode){
  const inp=document.getElementById('inp-'+mode),drop=document.getElementById('acdrop-'+mode);
  if(!inp||!drop)return;
  const q=inp.value.toLowerCase().trim();
  const used=new Set(S.modes[mode].guesses.map(g=>g.name));
  const pool=validPool(mode).filter(b=>!used.has(b));
  if(!q){drop.classList.remove('open');drop.innerHTML='';return}

  /* Build match list: {name, alias} — name-match has alias=null, alias-match has alias=string */
  const seen=new Set();
  const results=[];
  /* 1. Names starting with q */
  pool.forEach(b=>{if(b.toLowerCase().startsWith(q)&&!seen.has(b)){seen.add(b);results.push({name:b,alias:null});}});
  /* 2. Aliases starting with q (brawlers not already matched by name) */
  if(mode!=='map'){
    pool.forEach(b=>{
      if(seen.has(b))return;
      const a=_matchedAlias(b,q);
      if(a){seen.add(b);results.push({name:b,alias:a});}
    });
  }
  const top=results.slice(0,10);
  if(!top.length){drop.classList.remove('open');return}

  drop.innerHTML=top.map(({name:b,alias})=>{
    let icoHtml='';
    if(mode==='map'){
      const mapMode=MAPS[b]?MAPS[b].mode:'';
      const mPath=mapMode?'_mods/'+mapMode.toLowerCase().replace(/ /g,'_')+'.png':'';
      icoHtml=mPath?`<img class="ac-icon" src="${mPath}" alt="">`:'';
    } else if(brawlerIcon(b)){
      icoHtml=`<img class="ac-icon" src="${brawlerIcon(b)}" alt="">`;
    }
    return`<div class="ac-item" data-name="${esc(b)}" onmousedown="pick('${mode}',this)">${icoHtml}${esc(b)}</div>`;
  }).join('');
  drop.classList.add('open');
}
function acKey(e,mode){
  const drop=document.getElementById('acdrop-'+mode);if(!drop)return;
  const items=drop.querySelectorAll('.ac-item'),hi=drop.querySelector('.hi');
  if(e.key==='ArrowDown'){e.preventDefault();if(!hi)items[0]?.classList.add('hi');else{hi.classList.remove('hi');(hi.nextElementSibling||items[0]).classList.add('hi')}}
  else if(e.key==='ArrowUp'){e.preventDefault();if(!hi)items[items.length-1]?.classList.add('hi');else{hi.classList.remove('hi');(hi.previousElementSibling||items[items.length-1]).classList.add('hi')}}
  else if(e.key==='Enter'){
    e.preventDefault();
    const q=(document.getElementById('inp-'+mode)||{}).value||'';
    const ql=q.toLowerCase();
    const pool=validPool(mode);
    /* 1. Exact name match */
    const exactName=pool.find(b=>b.toLowerCase()===ql);
    if(exactName){doGuess(mode,exactName);return;}
    /* 2. Exact alias match (typed alias == one of the brawler's aliases exactly) */
    if(mode!=='map'){
      const exactAlias=pool.find(b=>(BRAWLERS[b]?.Aliases||[]).some(a=>a.toLowerCase()===ql));
      if(exactAlias){doGuess(mode,exactAlias);return;}
    }
    /* 3. Fallback: highlighted item or single result */
    const chosen=hi||(items.length===1?items[0]:null);
    if(chosen)doGuess(mode,chosen.dataset.name);
  }
  else if(e.key==='Escape')drop.classList.remove('open');
}
function pick(mode,el){doGuess(mode,el.dataset.name)}
function doGuess(mode,name){
  const drop=document.getElementById('acdrop-'+mode);if(drop){drop.classList.remove('open');drop.innerHTML=''}
  const inp=document.getElementById('inp-'+mode);if(inp)inp.value='';
  guess(mode,name);
  /* Do NOT refocus — let the user decide when to reopen the keyboard */
}
const _PM={};let _pmc=0;
function pmImg(src,cls='',style=''){

const _mapAnimations={};

const MAP_ZOOM_CORRECTION=1.52;

function _drawMapFrame(canvas,img,sc){
  const vpW=canvas.width,vpH=canvas.height;
  const imgW=img.naturalWidth,imgH=img.naturalHeight;
  if(!imgW||!imgH||!vpW||!vpH)return;
  const ox=parseFloat(canvas.dataset.ox),oy=parseFloat(canvas.dataset.oy);
  const ctx=canvas.getContext('2d');

  /* Ideal square crop side in image pixels, with correction factor */
  const minDim=Math.min(imgW,imgH);
  const idealSide=minDim*MAP_ZOOM_CORRECTION/sc;

  if(idealSide>=minDim){
    const fitScale=Math.min(vpW/imgW,vpH/imgH);
    const dw=imgW*fitScale, dh=imgH*fitScale;
    const dx=(vpW-dw)/2, dy=(vpH-dh)/2;
    ctx.fillStyle='#0b1622';
    ctx.fillRect(0,0,vpW,vpH);
    ctx.drawImage(img,0,0,imgW,imgH,dx,dy,dw,dh);
  } else {
    let sx=ox-idealSide/2, sy=oy-idealSide/2;
    sx=Math.min(Math.max(sx,0),imgW-idealSide);
    sy=Math.min(Math.max(sy,0),imgH-idealSide);
    ctx.drawImage(img,sx,sy,idealSide,idealSide,0,0,vpW,vpH);
  }
}

function _startMapCanvas(canvas,img,sc0,endSc,duration){
  const id=canvas.id;
  if(_mapAnimations[id]){cancelAnimationFrame(_mapAnimations[id].raf);delete _mapAnimations[id];}
  const start=performance.now();
  const step=(now)=>{
    const t=Math.min(1,(now-start)/duration);
    const ease=1-Math.pow(1-t,2);
    const sc=sc0+(endSc-sc0)*ease;
    _drawMapFrame(canvas,img,sc);
    if(t<1){_mapAnimations[id]={raf:requestAnimationFrame(step)};}
    else{delete _mapAnimations[id];}
  };
  _mapAnimations[id]={raf:requestAnimationFrame(step)};
}

function _applyMapCanvas(canvas){
  const rect=canvas.getBoundingClientRect();
  canvas.width=Math.round(rect.width*devicePixelRatio)||Math.round(rect.width);
  canvas.height=Math.round(rect.height*devicePixelRatio)||Math.round(rect.height);
  canvas.style.width=rect.width+'px';
  canvas.style.height=rect.height+'px';
  const img=canvas._mapImg;
  if(!img)return;
  const sc=parseFloat(canvas.dataset.sc)||1;
  const minDim=Math.min(img.naturalWidth,img.naturalHeight);
  const endSc=Math.max(MAP_ZOOM_CORRECTION,sc*0.88);
  _drawMapFrame(canvas,img,sc);
  _startMapCanvas(canvas,img,sc,endSc,60000);
}
function resolveMedia(){
  document.querySelectorAll('[data-pmid]').forEach(el=>{
    const src=_PM[el.dataset.pmid]||'';
    el.removeAttribute('data-pmid');
    if(!src)return;
    if(el.classList.contains('map-canvas')){
      fetch(src).then(r=>r.blob()).then(b=>{
        const img=new Image();
        img.onload=()=>{
          el._mapImg=img;
          _applyMapCanvas(el);
        };
        img.src=URL.createObjectURL(b);
      }).catch(()=>{});
    } else if(el.tagName==='AUDIO'||el.tagName==='IMG'){
      fetch(src).then(r=>r.blob()).then(b=>{el.src=URL.createObjectURL(b);}).catch(()=>{});
    } else {
      el.src=src;
    }
  });
}

  const avgGuesses=allPlayed.length
    ?+(allPlayed.reduce((s,e)=>s+e.g,0)/allPlayed.length).toFixed(1):0;
  const best=S.streaks[mode]?.best||0;

  if(!allPlayed.length){
    contentEl.innerHTML=`<div class="stats-empty">No games recorded yet.</div>`;

      <div class="stats-row"><span class="stats-label">🎮 Games played</span><span class="stats-val">${allPlayed.length}</span></div>
      <div class="stats-row"><span class="stats-label">🎯 Average guesses</span><span class="stats-val">${avgGuesses}</span></div>
      <div class="stats-row"><span class="stats-label">🔥 Best streak</span><span class="stats-val">${best}</span></div>`;
  }

}

function copyEmail(){
  const email='brawlstarsdle.dukook@gmail.com';
  const _done=()=>{
    const btn=document.querySelector('.report-btn');
    if(!btn)return;
    btn.textContent='✓';btn.style.color='var(--green)';btn.style.borderColor='var(--green)';
    setTimeout(()=>{btn.textContent='⚠';btn.style.color='';btn.style.borderColor='';},2000);
  };
  /* Modern clipboard API (works on most mobile browsers if page is HTTPS) */
  if(navigator.clipboard&&window.isSecureContext){
    navigator.clipboard.writeText(email).then(_done).catch(()=>_copyFallback(email,_done));
  } else {
    _copyFallback(email,_done);
  }
}
function _copyFallback(text,cb){
  /* Create a temporary input, select it, copy — works on mobile */
  const inp=document.createElement('input');
  inp.value=text;
  inp.style.cssText='position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);opacity:0.01;font-size:16px;border:0;';
  document.body.appendChild(inp);
  inp.focus();inp.select();
  try{document.execCommand('copy');cb();}catch(e){}
  document.body.removeChild(inp);
}

const RARITY_ORDER=['starting_brawler','rare','super_rare','epic','mythic','legendary','ultra_legendary'];
const RARITY_LABELS={
  starting_brawler:'Starting Brawler',rare:'Rare',super_rare:'Super Rare',
  epic:'Epic',mythic:'Mythic',legendary:'Legendary',ultra_legendary:'Ultra Legendary'
};
const RARITY_COLORS={
  starting_brawler:'#75d1f5',rare:'#00e300',super_rare:'#14a4ff',
  epic:'#b116ec',mythic:'#f04141',legendary:'#fdf01f',ultra_legendary:'#ff4fe8'
};

const WORLD_ORDER=['town_square','retropolis','frontier_world','haunted_haven','adventure_land','mystic_mountain','brawlywood','fairytale_castle','tomorroworld','water_land','chronotrap','tunes_town','creepsville','toyland','madevil_manor'];
const WORLD_LABELS={frontier_world:'Frontier World',retropolis:'Retropolis',adventure_land:'Adventure Land',tomorroworld:'Tomorroworld',town_square:'Town Square',mystic_mountain:'Mystic Mountain',haunted_haven:'Haunted Haven',fairytale_castle:'Fairytale Castle',brawlywood:'Brawlywood',water_land:'Water Land',chronotrap:'Chronotrap',creepsville:'Creepsville',tunes_town:'Tunes Town',madevil_manor:'MadEvil Manor',madvil_manor:'Madvil Manor',toyland:'Toyland'};
const WORLD_COLORS={frontier_world: '#ac1e2a',retropolis: '#801ca4',adventure_land: '#006f08',tomorroworld: '#227add',town_square: '#09a980',mystic_mountain: '#fdbb56',haunted_haven: '#6a7d70',fairytale_castle: '#e81880',brawlywood: '#fff035',water_land: '#3bcfde',chronotrap: '#ff7d57',creepsville: '#0a8580',tunes_town: '#ff76b7',madevil_manor: '#ff1f1d',toyland: '#f2506c'};
const CLASS_ORDER=['damage_dealer','assassin','tank','controller','support','marksman','artillery'];
const CLASS_LABELS={damage_dealer:'Damage Dealer',assassin:'Assassin',tank:'Tank',controller:'Controller',support:'Support',marksman:'Marksman',artillery:'Artillery'};
const CLASS_COLORS={damage_dealer:'#e74c3c',assassin:'#9b59b6',tank:'#3498db',controller:'#f1c40f',support:'#27ae60',marksman:'#e67e22',artillery:'#1abc9c'};
let _panelSort='rarity';

function _panelChip(n){
  return`<div class="brawler-chip"><img src="${brawlerIcon(n)}" alt=""><span class="brawler-chip-name">${esc(n)}</span></div>`;
}

function _buildMapPanelHTML(){
  const modeGroups={};
  Object.entries(MAPS).forEach(([name,data])=>{
    const m=data.mode||'Unknown';
    if(!modeGroups[m])modeGroups[m]=[];
    modeGroups[m].push(name);
  });
  Object.keys(modeGroups).forEach(m=>modeGroups[m].sort());
  const sortedModes=Object.keys(modeGroups).sort();
  return sortedModes.map(m=>{
    const modePath='_mods/'+m.toLowerCase().replace(/ /g,'_')+'.png';
    const chips=modeGroups[m].map(name=>`<div class="brawler-chip" style="width:auto;border-radius:10px;padding:5px 10px;gap:7px;font-size:.78rem">
      <img src="${modePath}" style="width:20px;height:20px;object-fit:contain;border-radius:0;flex-shrink:0;" alt="">
      <span style="color:var(--text)">${esc(name)}</span>
    </div>`).join('');
    return`<div class="rarity-section">
      <div class="rarity-label"><img src="${modePath}" alt="" style="width:20px;height:20px;object-fit:contain;vertical-align:middle;margin-right:6px;">${m} (${modeGroups[m].length})</div>
      <div class="brawler-grid">${chips}</div>
    </div>`;
  }).join('');
}
function _buildPanelHTML(sort,filterPool){
  const poolSet=filterPool?new Set(filterPool):null;
  const all=Object.entries(BRAWLERS).filter(([n,v])=>v.Stats&&(!poolSet||poolSet.has(n)));
  if(sort==='class'){
    const byClass={};
    all.forEach(([n,v])=>{const cl=v.Stats.class;if(!byClass[cl])byClass[cl]=[];byClass[cl].push(n);});
    Object.keys(byClass).forEach(cl=>byClass[cl].sort((a,b)=>a.localeCompare(b)));
    let html='';
    CLASS_ORDER.forEach(cl=>{
      if(!byClass[cl])return;
      const col=CLASS_COLORS[cl]||'#aaa';
      html+=`<div class="rarity-section">
        <div class="rarity-label" style="color:${col}"><img src="_class/${cl}.png" alt="" style="width:20px;height:20px;object-fit:contain;vertical-align:middle;margin-right:6px;filter:drop-shadow(0 0 4px ${col}88)">${CLASS_LABELS[cl]||cl} (${byClass[cl].length})</div>
        <div class="brawler-grid">${byClass[cl].map(_panelChip).join('')}</div>
      </div>`;
    });
    return html;
  } else if(sort==='world'){
    const byWorld={};
    all.forEach(([n,v])=>{const w=v.Stats.world||'other';if(!byWorld[w])byWorld[w]=[];byWorld[w].push(n);});
    Object.keys(byWorld).forEach(w=>byWorld[w].sort((a,b)=>a.localeCompare(b)));
    const worldKeys=[...new Set([...WORLD_ORDER,...Object.keys(byWorld)])];
    let html='';
    worldKeys.forEach(w=>{
      if(!byWorld[w])return;
      const label=WORLD_LABELS[w]||w.replace(/_/g,' ').replace(/\w/g,c=>c.toUpperCase());
      const col=WORLD_COLORS[w]||'#aaa';
      html+=`<div class="rarity-section">
        <div class="rarity-label" style="color:${col}"><img src="_world/${w}.png" alt="" style="width:20px;height:20px;object-fit:contain;vertical-align:middle;margin-right:6px;filter:drop-shadow(0 0 4px ${col}88)">${label} (${byWorld[w].length})</div>
        <div class="brawler-grid">${byWorld[w].map(_panelChip).join('')}</div>
      </div>`;
    });
    return html;
  } else {
    const byRarity={};
    all.sort((a,b)=>{const ri=RARITY_ORDER.indexOf(a[1].Stats.rarity)-RARITY_ORDER.indexOf(b[1].Stats.rarity);return ri!==0?ri:a[0].localeCompare(b[0]);});
    all.forEach(([n,v])=>{const r=v.Stats.rarity;if(!byRarity[r])byRarity[r]=[];byRarity[r].push(n);});
    let html='';
    RARITY_ORDER.forEach(r=>{
      if(!byRarity[r])return;
      const col=RARITY_COLORS[r];
      html+=`<div class="rarity-section">
        <div class="rarity-label" style="color:${col}"><img src="_rarity/${r}.png" alt="" style="width:20px;height:20px;object-fit:contain;vertical-align:middle;margin-right:6px;filter:drop-shadow(0 0 4px ${col}88)">${RARITY_LABELS[r]||r} (${byRarity[r].length})</div>
        <div class="brawler-grid">${byRarity[r].map(_panelChip).join('')}</div>
      </div>`;
    });
    return html;
  }
}

function openBrawlerPanel(){
  const panel=document.getElementById('brawler-panel-overlay');
  if(!panel)return;
  const isMap=S.activeMode==='map';
  const titleEl=document.getElementById('panel-title');
  if(titleEl)titleEl.textContent=isMap?'🗺️ All Maps':'🏅 All Brawlers';
  const sortToggle=panel.querySelector('.sort-toggle');
  if(sortToggle)sortToggle.style.display=isMap?'none':'';
  if(isMap){
    document.getElementById('brawler-panel-content').innerHTML=_buildMapPanelHTML();

    document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));
    document.getElementById('sort-'+_panelSort)?.classList.add('active');
    const pool=validPool(S.activeMode);
    document.getElementById('brawler-panel-content').innerHTML=_buildPanelHTML(_panelSort,pool);
  }
  panel.classList.add('open');
}

function setPanelSort(sort){
  if(_panelSort===sort)return;
  _panelSort=sort;
  document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('sort-'+sort)?.classList.add('active');
  const cont=document.getElementById('brawler-panel-content');
  cont.style.transition='opacity .18s';
  cont.style.opacity='0';
  setTimeout(()=>{
    const pool=validPool(S.activeMode);
    cont.innerHTML=_buildPanelHTML(sort,pool);
