<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Brawldle</title>
<link rel="icon" type="image/png" href="melodie.png">
<style>

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
@font-face{font-family:'Lilita One';src:url('LilitaOne.ttf') format('truetype');font-weight:400;font-display:swap}
@font-face{font-family:'Nunito';src:url('Nunito.ttf') format('truetype');font-weight:100 900;font-display:swap}

:root{
  --bg:#0b1622;--bg2:#12202f;--bg3:#1a2d40;--bg4:#223550;
  --accent:#ffd000;--text:#e8edf4;--text2:#6e8fa8;
  --green:#27ae60;--red:#c0392b;--orange:#d68910;
  --border:#1e3248;--radius:14px;--shadow:0 6px 28px rgba(0,0,0,.55);
}
html{scroll-behavior:smooth}
body{
  font-family:'Nunito',sans-serif;font-size:15px;color:var(--text);
  min-height:100vh;overflow-x:hidden;
}

/* Background */
.bg-overlay{
  position:fixed;inset:0;z-index:-1;
  background:url('bs.png') center/cover no-repeat;
  filter:brightness(.2) blur(2px) saturate(1.4);
  animation:bgDrift 22s ease-in-out infinite;
}
@keyframes bgDrift{
  0%  {transform:scale(1.07) translate(0,0)}
  20% {transform:scale(1.07) translate(-0.9%,-0.5%)}
  45% {transform:scale(1.07) translate(0.6%,-0.9%)}
  70% {transform:scale(1.07) translate(0.9%,0.4%)}
  100%{transform:scale(1.07) translate(0,0)}
}
.bg-solid{position:fixed;inset:0;z-index:-1;background:rgba(11,22,34,.72)}

/* Header */
.header{
  background:linear-gradient(180deg,rgba(6,12,22,.97) 0%,rgba(12,24,38,.93) 100%);
  border-bottom:2px solid rgba(255,208,0,.2);
  padding:26px 20px 18px;text-align:center;
}
.header-logo{
  font-family:'Lilita One',cursive;
  font-size:clamp(2.4rem,7vw,3.8rem);
  color:var(--accent);letter-spacing:6px;
  text-shadow:0 0 40px rgba(255,208,0,.4),0 3px 0 #6a4a00;
  line-height:1;
}
.header-sub{color:var(--text2);font-size:.82rem;margin-top:6px;font-weight:700;letter-spacing:1px}

/* Tabs */
.tabs{
  display:flex;justify-content:center;flex-wrap:wrap;
  gap:10px;padding:16px;
  background:rgba(12,24,38,.92);border-bottom:1px solid var(--border);
  backdrop-filter:blur(8px);
}
.tab{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:13px 18px;min-width:92px;cursor:pointer;
  border-radius:16px;border:2px solid var(--border);
  background:var(--bg3);transition:all .2s;position:relative;
  user-select:none;
}
.tab:hover{border-color:rgba(255,208,0,.5);transform:translateY(-1px)}
.tab.active{border-color:var(--accent);background:rgba(255,208,0,.07);box-shadow:0 0 18px rgba(255,208,0,.12)}
.tab.done{border-color:var(--green);background:rgba(39,174,96,.07)}
.tab-shine{
  position:absolute;top:5px;right:5px;width:7px;height:7px;
  border-radius:50%;background:var(--accent);
  box-shadow:0 0 8px var(--accent);
  opacity:0;
}
.tab.active .tab-shine{opacity:1;animation:pulse 1.4s ease-in-out infinite}
.tab-emoji{font-size:1.6rem;line-height:1}
.tab-label{font-size:.7rem;font-weight:900;color:var(--text2);letter-spacing:.5px;text-transform:uppercase}
.tab.active .tab-label{color:var(--accent)}
.tab.done .tab-label{color:var(--green)}
.tab-streak{font-size:.72rem;font-weight:800;color:var(--text2)}
.tab.active .tab-streak{color:var(--accent)}

/* Game area */
.game-area{max-width:980px;margin:0 auto;padding:22px 14px 60px}

/* Mode header */
.mode-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:14px;flex-wrap:wrap;gap:8px;
}
.mode-title{font-family:'Lilita One',cursive;font-size:1.4rem;color:var(--accent)}
.wrong-badge{
  display:inline-flex;align-items:center;gap:4px;
  background:rgba(192,57,43,.18);color:var(--red);
  padding:4px 12px;border-radius:20px;font-size:.82rem;font-weight:800;
}

/* Rotation info */
.rotation-info{
  background:rgba(18,32,47,.8);border:1px solid var(--border);
  border-left:3px solid var(--accent);border-radius:8px;
  padding:9px 14px;margin-bottom:14px;
  font-size:.78rem;color:var(--text2);font-weight:700;
}
.rotation-info b{color:var(--accent)}

/* Search */
.search-wrap{position:relative;margin-bottom:12px}
.search-input{
  width:100%;padding:13px 18px;
  background:rgba(18,32,47,.9);border:2px solid var(--border);
  border-radius:var(--radius);color:var(--text);
  font-family:'Nunito',sans-serif;font-size:1rem;font-weight:700;
  outline:none;transition:border-color .2s,box-shadow .2s;
}
.search-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(255,208,0,.1)}
.search-input::placeholder{color:var(--text2);font-weight:600}
.search-input:disabled{opacity:.45;cursor:not-allowed}
.ac-list{
  position:absolute;top:calc(100% + 5px);left:0;right:0;
  background:var(--bg2);border:2px solid var(--accent);
  border-radius:var(--radius);max-height:220px;overflow-y:auto;
  z-index:200;display:none;box-shadow:var(--shadow);
}
.ac-list.open{display:block}
.ac-item{padding:10px 18px;cursor:pointer;font-weight:700;transition:background .1s}
.ac-item:hover,.ac-item.hi{background:var(--bg4);color:var(--accent)}

/* Banners */
.banner{border-radius:var(--radius);padding:20px 22px;margin-bottom:16px;text-align:center}
.banner-win{background:rgba(39,174,96,.12);border:2px solid rgba(39,174,96,.3)}
.banner-lose{background:rgba(192,57,43,.1);border:2px solid rgba(192,57,43,.25)}
.banner h2{font-family:'Lilita One',cursive;font-size:1.7rem}
.banner-win h2{color:var(--green)}
.banner-lose h2{color:var(--red)}
.banner p{color:var(--text2);margin-top:5px;font-weight:700;font-size:.88rem}
.banner p strong{color:var(--text)}
.next-btn{
  display:block;width:100%;margin-top:12px;
  padding:14px 20px;border-radius:var(--radius);
  background:linear-gradient(135deg,rgba(255,208,0,.15),rgba(255,153,0,.12));
  border:2px solid rgba(255,208,0,.35);
  color:var(--accent);font-family:'Nunito',sans-serif;
  font-size:1rem;font-weight:900;cursor:pointer;transition:all .2s;
}
.next-btn:hover{background:linear-gradient(135deg,rgba(255,208,0,.25),rgba(255,153,0,.2));transform:translateY(-1px)}

/* Hints toggle */
.hints-bar{display:flex;justify-content:flex-end;margin-bottom:10px}
.hints-toggle{
  padding:6px 16px;border-radius:20px;cursor:pointer;
  font-family:'Nunito',sans-serif;font-size:.78rem;font-weight:800;
  transition:all .2s;border:1px solid var(--border);background:var(--bg3);color:var(--text2);
}
.hints-toggle.on{background:rgba(255,208,0,.1);color:var(--accent);border-color:rgba(255,208,0,.3)}

/* ── Table ── */
.table-outer{
  position:relative;border-radius:var(--radius);
  border:1px solid var(--border);box-shadow:var(--shadow);
  background:rgba(12,24,38,.7);overflow:visible;
  margin:0 36px; /* space for arrows outside */
}
.table-wrap{
  overflow-x:auto;border-radius:var(--radius);
  scrollbar-width:thin;scrollbar-color:var(--accent) var(--bg3);
}
.table-wrap::-webkit-scrollbar{height:6px}
.table-wrap::-webkit-scrollbar-track{background:var(--bg3)}
.table-wrap::-webkit-scrollbar-thumb{background:var(--accent);border-radius:3px}

/* Scroll arrows — permanently visible outside the table */
.scroll-btn{
  position:absolute;top:50%;transform:translateY(-50%);
  z-index:20;width:32px;height:52px;
  background:rgba(18,32,47,.75);border:1px solid var(--border);
  color:var(--text2);cursor:pointer;font-size:1.4rem;
  display:flex;align-items:center;justify-content:center;
  border-radius:8px;transition:all .2s;
  opacity:1;pointer-events:auto;
}
.scroll-btn.sl{left:-36px}
.scroll-btn.sr{right:-36px}
.scroll-btn:hover{background:var(--accent);color:#000;border-color:var(--accent)}

.stats-table{width:100%;border-collapse:separate;border-spacing:0;min-width:720px}
.stats-table thead th{
  background:rgba(26,45,64,.95);padding:10px 10px;
  font-size:.68rem;text-transform:uppercase;letter-spacing:.6px;
  color:var(--text2);white-space:nowrap;text-align:center;
  font-weight:900;border-bottom:1px solid var(--border);
}
.stats-table thead th:first-child{text-align:left;padding-left:13px;min-width:130px}
.stats-table tbody td{
  padding:0;text-align:center;font-size:.82rem;font-weight:800;
  border-bottom:1px solid rgba(30,50,72,.6);
  position:relative;height:58px;
}
.stats-table tbody td:first-child{
  text-align:left;padding:0 10px 0 13px;font-size:.85rem;white-space:nowrap;
  color:var(--text);max-width:150px;overflow:hidden;text-overflow:ellipsis;
}
.cell-inner{
  position:relative;display:flex;align-items:center;justify-content:center;
  height:100%;padding:8px 10px;overflow:hidden;
}
.cell-bg-arr{
  position:absolute;font-size:5.5rem;opacity:.22;
  top:50%;left:50%;transform:translate(-50%,-50%);
  line-height:1;pointer-events:none;user-select:none;
  font-style:normal;font-weight:900;
  -webkit-text-stroke:2px currentColor;
}
.cell-txt{position:relative;z-index:1;font-weight:900;font-size:.82rem}

.stats-table tbody tr:last-child td{border-bottom:none}
.cell-correct{background:rgba(39,174,96,.28)!important;color:#5fffa3}
.cell-wrong{background:rgba(192,57,43,.25)!important;color:#ffaaaa}
.cell-partial{background:rgba(214,137,16,.25)!important;color:#ffd580}
.cell-arrow{font-size:.85em;margin-left:3px}
.cell-hidden{background:var(--bg3)!important;color:transparent!important;transition:background .3s,color .3s}

/* Cell reveal animation */
@keyframes cellReveal{
  0%{opacity:0;transform:rotateX(90deg) scale(.85)}
  55%{transform:rotateX(-6deg)}
  100%{opacity:1;transform:rotateX(0deg) scale(1)}
}
.cell-anim{animation:cellReveal .55s cubic-bezier(.34,1.56,.64,1) forwards;opacity:0}

/* Info btn */
.info-btn{
  display:inline-flex;align-items:center;justify-content:center;
  width:13px;height:13px;background:var(--accent);color:#000;
  border-radius:50%;font-size:.58rem;font-weight:900;cursor:default;
  margin-left:4px;vertical-align:middle;flex-shrink:0;user-select:none;
}

/* Tooltip */
#tooltip{
  position:fixed;background:var(--bg4);border:1px solid var(--border);
  border-radius:8px;padding:10px 14px;font-size:.78rem;max-width:280px;
  z-index:9999;color:var(--text);box-shadow:var(--shadow);
  display:none;line-height:1.5;font-weight:600;pointer-events:none;
}

/* Fact */
.fact-card{
  background:rgba(18,32,47,.85);border:1px solid var(--border);
  border-radius:var(--radius);padding:24px;margin-bottom:16px;
  box-shadow:var(--shadow);
}
.fact-text{font-size:1.1rem;font-weight:700;line-height:1.7}
.fact-unknown{color:var(--accent);background:rgba(255,208,0,.1);padding:1px 7px;border-radius:4px}
.fact-revealed{color:var(--green);background:rgba(39,174,96,.12);padding:1px 7px;border-radius:4px;font-weight:900}
.hints-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
.hint-pill{
  padding:5px 13px;border-radius:20px;font-size:.76rem;font-weight:800;
  background:var(--bg3);color:var(--text2);border:1px solid var(--border);transition:all .3s;
}
.hint-pill.shown{background:rgba(255,208,0,.1);color:var(--accent);border-color:rgba(255,208,0,.25)}

/* Voiceline */
.vl-card{
  background:rgba(18,32,47,.85);border-left:4px solid var(--accent);
  border-radius:var(--radius);padding:26px;margin-bottom:16px;box-shadow:var(--shadow);
}
.vl-label{color:var(--text2);font-size:.68rem;font-weight:900;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.vl-text{font-family:'Lilita One',cursive;font-size:clamp(1.2rem,3vw,1.55rem);line-height:1.45;color:var(--text)}
.audio-note{color:var(--text2);font-size:.76rem;font-weight:700;margin-top:10px}
.audio-wrap{margin-top:14px}
.audio-wrap audio{width:100%;border-radius:8px}

/* Emoji */
.emoji-card{
  background:rgba(18,32,47,.85);border:1px solid var(--border);
  border-radius:var(--radius);padding:28px;margin-bottom:16px;text-align:center;box-shadow:var(--shadow);
}
.emoji-display{font-size:clamp(2rem,6vw,3rem);letter-spacing:10px;line-height:1.5}
.emoji-sub{color:var(--text2);font-size:.76rem;font-weight:700;margin-top:10px}

/* Image */
.img-card{
  background:rgba(18,32,47,.85);border:1px solid var(--border);
  border-radius:var(--radius);padding:18px;margin-bottom:16px;box-shadow:var(--shadow);
}
.img-grid{display:grid;gap:14px}
.img-grid.one{grid-template-columns:1fr;max-width:400px;margin:0 auto}
.img-grid.two{grid-template-columns:1fr 1fr}
.img-slot{
  background:var(--bg3);border-radius:10px;overflow:hidden;
  display:flex;align-items:center;justify-content:center;aspect-ratio:2010/1250;
}
.img-slot img{width:100%;height:100%;object-fit:contain}
.img-placeholder{color:var(--text2);font-size:.82rem;font-weight:700;text-align:center;padding:12px}
.img-locked{
  display:flex;align-items:center;justify-content:center;flex-direction:column;
  gap:8px;background:var(--bg3);border-radius:10px;aspect-ratio:2010/1250;
  color:var(--text2);font-size:.8rem;font-weight:700;text-align:center;padding:12px;
}
.img-label{text-align:center;color:var(--text2);font-size:.68rem;font-weight:900;text-transform:uppercase;margin-top:5px;letter-spacing:.5px}

/* Guess list */
.guess-list{display:flex;flex-direction:column;gap:7px;margin-top:8px}
.guess-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 15px;border-radius:9px;font-weight:800;font-size:.9rem;
  animation:fadeUp .2s ease;
}
.guess-item.ok{background:rgba(39,174,96,.12);border:1px solid rgba(39,174,96,.25);color:var(--green)}
.guess-item.fail{background:rgba(192,57,43,.08);border:1px solid rgba(192,57,43,.18);color:var(--red)}

/* ── Victory effects ── */
#victory-overlay{
  position:fixed;inset:0;z-index:9990;pointer-events:none;overflow:hidden;
}
@keyframes gentleSpin{
  0%  {transform:rotate(0deg) scale(1)}
  20% {transform:rotate(-1.8deg) scale(1.025)}
  45% {transform:rotate(1.5deg) scale(1.04)}
  65% {transform:rotate(-1deg) scale(1.028)}
  82% {transform:rotate(.5deg) scale(1.012)}
  93% {transform:rotate(-.2deg) scale(1.004)}
  100%{transform:rotate(0deg) scale(1)}
}
@keyframes flashWin{
  0%{opacity:.55}
  100%{opacity:0}
}
.flash-win{
  position:fixed;inset:0;z-index:9989;pointer-events:none;
  background:radial-gradient(circle at center,rgba(255,208,0,.18) 0%,rgba(39,174,96,.1) 55%,rgba(0,0,0,.45) 100%);
  animation:flashWin .85s ease forwards;
}
@keyframes confettiFall{
  0%{transform:translateY(-20px) rotate(0deg);opacity:1}
  100%{transform:translateY(110vh) rotate(720deg);opacity:0}
}
.confetti{
  position:absolute;width:10px;height:10px;
  animation:confettiFall linear forwards;
  border-radius:2px;
}
@keyframes bounce-in{
  0%{transform:scale(.3);opacity:0}
  60%{transform:scale(1.1)}
  80%{transform:scale(.95)}
  100%{transform:scale(1);opacity:1}
}

/* Report button */
.report-btn{
  position:fixed;bottom:14px;right:16px;z-index:500;
  background:rgba(18,32,47,.6);border:1px solid rgba(255,255,255,.08);
  border-radius:50%;width:26px;height:26px;
  display:flex;align-items:center;justify-content:center;
  font-size:.85rem;cursor:pointer;color:rgba(255,255,255,.25);
  transition:color .2s,border-color .2s;
}
.report-btn:hover{color:rgba(255,255,255,.6);border-color:rgba(255,255,255,.2)}
.report-tip{
  position:fixed;bottom:46px;right:16px;z-index:501;
  background:var(--bg4);border:1px solid var(--border);border-radius:8px;
  padding:10px 14px;font-size:.76rem;max-width:240px;color:var(--text2);
  font-weight:700;line-height:1.5;display:none;pointer-events:none;
  box-shadow:var(--shadow);text-align:left;
}
.report-btn:hover + .report-tip{display:block}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{box-shadow:0 0 6px var(--accent)}50%{box-shadow:0 0 14px var(--accent)}}

@media(max-width:540px){
  .tab{min-width:72px;padding:11px 12px}
  .tab-emoji{font-size:1.3rem}
  .fact-text{font-size:.95rem}
  .table-outer{margin:0 28px}
  .scroll-btn.sl{left:-28px}
  .scroll-btn.sr{right:-28px}
}

</style>
</head>
<body>
<div class="bg-overlay"></div>
<div class="bg-solid"></div>
<div id="app"><div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#ffd000;font-family:sans-serif;font-size:1.2rem">⚡ Loading Brawldle…</div></div>
<script>
let BRAWLERS = {};

function _initGame(data){
  BRAWLERS = data;
  ANSWERS = getDailyAnswers();   // ← must run AFTER BRAWLERS is set
  loadState();
  render();
}

function _showLoadError(){
  document.getElementById('app').innerHTML =
    '<div style="color:#e74c3c;font-family:sans-serif;padding:30px;max-width:520px;margin:80px auto;' +
    'background:rgba(0,0,0,.6);border-radius:12px">' +
    '<h2>⚠️ Impossible de charger stats.json</h2>' +
    '<p>Utilise <b>VS Code + Live Server</b> pour ouvrir le jeu :</p>' +
    '<ol><li>Installe lextension <b>Live Server</b> dans VS Code</li>' +
    '<li>Clic droit sur <b>brawldle.html</b> → <i>Open with Live Server</i></li>' +
    '<li>Le jeu souvre sur <code>http://127.0.0.1:5500/</code> — fetch fonctionne 👍</li></ol>' +
    '<p style="color:#aaa;font-size:.85rem">Ouvrir le fichier directement (file://) bloque fetch par sécurité.</p></div>';
}

fetch('stats.json')
  .then(r => { if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
  .then(_initGame)
  .catch(_showLoadError);

const MODES = ['classic','fact','voiceline','emoji','image'];
const MODE_META = {
  classic:   {label:'Classic',   emoji:'🔃', color:'#27ae60'},
  fact:      {label:'Fact',      emoji:'📖', color:'#f1c40f'},
  voiceline: {label:'Voiceline', emoji:'🔊', color:'#3498db'},
  emoji:     {label:'Emoji',     emoji:'🧐', color:'#9b59b6'},
  image:     {label:'Image',     emoji:'🖼️', color:'#e74c3c'},
};
const SEEDS = {classic:1337,fact:4721,voiceline:9203,emoji:6614,image:2958};

const COL_GROUPS = [
  ['gender'],
  ['class','rarity','world'],
  ['hp','mvt'],
  ['damage_per_projectile','full_damage','projectiles'],
  ['range','damage_type'],
  ['reload_speed','ammo'],
  ['ult_charge','hc_multiplier','hitbox'],
  ['release','nb_skins','gadget_cd'],
];
const COL_LABELS = {
  gender:'Gender',class:'Class',rarity:'Rarity',world:'World',
  hp:'HP',mvt:'Speed',
  damage_per_projectile:'Dmg/Proj',full_damage:'Full Dmg',projectiles:'Projectiles',
  range:'Range',damage_type:'Dmg Type',
  reload_speed:'Reload',ammo:'Ammo',
  ult_charge:'Ult',hc_multiplier:'HC %',hitbox:'Hitbox',
  release:'Release',nb_skins:'Skins',
  gadget_cd_min:'Gadget CD↓',gadget_cd_max:'Gadget CD↑',
};
const COL_INFO = {
  gender:'Gender of the brawler',
  class:'Role: Damage Dealer, Tank, Support, Controller, Marksman, Assassin…',
  rarity:'Rarity tier: Rare, Super Rare, Epic, Mythic, Legendary, Ultra Legendary…',
  world:'Thematic universe in Brawl Stars lore',
  hp:'Base health points at power level 11',
  mvt:'Movement speed category derived from internal value',
  damage_per_projectile:'Damage per projectile shown in-game (or per tick for Willow, Byron…)',
  full_damage:'Max damage of one normal attack — normal hitbox, no movement, no buffs. Per second for continuous attackers (Amber, Moe…).',
  projectiles:'Number of projectiles per attack, or per second for continuous attackers',
  range:'Attack range category in tiles',
  damage_type:'single: 1 target | pierce: goes through enemies | spread: multiple projectiles | splash: AoE (explosion, through Mina shield)',
  reload_speed:'Reload speed category. Arrow ↑ = faster reload (lower time)',
  ammo:'Number of ammo charges before reloading',
  ult_charge:'Number of attacks needed to fully charge the super',
  hc_multiplier:'Hypercharge speed multiplier in %',
  hitbox:'Collision size (Normal = 120px, Large = 145px)',
  release:'Year the brawler was first released',
  nb_skins:'Total number of skins',
  gadget_cd_min:'Shortest cooldown between both gadgets (seconds)',
  gadget_cd_max:'Longest cooldown between both gadgets (seconds)',
};

/* ── RNG ── */
function lcg(seed){
  let s=(seed|0)>>>0;
  return()=>{s=((Math.imul(s,1664525)+1013904223)>>>0);return s/4294967296};
}
function seededShuffle(arr,seed){
  const a=[...arr],rng=lcg(seed);
  for(let i=a.length-1;i>0;i--){const j=Math.floor(rng()*(i+1));[a[i],a[j]]=[a[j],a[i]]}
  return a;
}
function dayIndex(){
  const n=new Date();
  return Math.floor(Date.UTC(n.getUTCFullYear(),n.getUTCMonth(),n.getUTCDate())/86400000);
}

/* ── Daily columns ── */
function getDailyCols(){
  const di=dayIndex();
  return COL_GROUPS.map((group,gi)=>{
    const pick=group[Math.floor(lcg(di*7919+gi*31+13)()*group.length)];
    if(pick==='gadget_cd')return lcg(di*7919+gi*31+77)()<0.5?'gadget_cd_min':'gadget_cd_max';
    return pick;
  });
}

/* ── Daily answers ── */
function getDailyAnswers(){
  const di=dayIndex();
  const all=Object.keys(BRAWLERS);
  const pools={
    classic: all.filter(b=>BRAWLERS[b].Stats),
    fact:    all.filter(b=>BRAWLERS[b].Fact?.length>0),
    voiceline:all.filter(b=>BRAWLERS[b].Voicelines?.length>0),
    emoji:   all.filter(b=>BRAWLERS[b].Emojis?.length>0),
    image:   all.filter(b=>BRAWLERS[b].Images),
  };
  const picked=new Set();const ans={};
  MODES.forEach(m=>{
    const sh=seededShuffle(pools[m],SEEDS[m]);
    let idx=di%sh.length,sf=0;
    while(picked.has(sh[idx])&&sf++<sh.length)idx=(idx+1)%sh.length;
    ans[m]=sh[idx];picked.add(sh[idx]);
  });
  return ans;
}

/* ── Label helpers ── */
function speedLabel(v){
  if(v>=820)return'Very Fast';if(v===770)return'Fast';
  if(v===720)return'Normal';if(v===650||v===620)return'Slow';return'Very Slow';
}
function rangeLabel(v){if(v>9)return'Very Long';if(v>=7)return'Long';if(v>=4)return'Normal';return'Short'}
function reloadLabel(v){
  if(v<=1.3)return'Very Fast';if(v<=1.4)return'Fast';
  if(v<=1.9)return'Normal';if(v<=2.2)return'Slow';return'Very Slow';
}
function hitboxLabel(v){return v===145?'Large':'Normal'}

function getStatValue(brawler,stat){
  if(stat==='gadget_cd_min'||stat==='gadget_cd_max'){
    const cd=brawler.Stats.gadget_cd;if(!cd)return null;
    const vals=Object.values(cd).map(Number);
    return stat==='gadget_cd_min'?Math.min(...vals):Math.max(...vals);
  }
  return brawler.Stats[stat];
}
function fmt(stat,val){
  if(val===null||val===undefined)return'—';
  switch(stat){
    case'hp':return val.toLocaleString();
    case'gender':return val[0].toUpperCase()+val.slice(1);
    case'rarity':case'class':case'world':
      return val.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
    case'damage_type':return val[0].toUpperCase()+val.slice(1);
    case'hitbox':return hitboxLabel(val);
    case'mvt':return speedLabel(val);
    case'range':return rangeLabel(val);
    case'reload_speed':return reloadLabel(val);
    case'hc_multiplier':return val+'%';
    case'ult_charge':return Number.isInteger(val)?String(val):val.toFixed(2);
    case'gadget_cd_min':case'gadget_cd_max':return val+'s';
    case'nb_skins':return val+' skins';
    default:return String(val);
  }
}
function cmpStat(stat,gv,tv){
  if(gv===null||gv===undefined||tv===null||tv===undefined)return{cls:'wrong',arrow:''};
  const cats=['gender','rarity','class','damage_type','passive_ability','world','hitbox'];
  if(cats.includes(stat))return{cls:gv===tv?'correct':'wrong',arrow:''};
  if(stat==='mvt'){
    if(gv===tv)return{cls:'correct',arrow:''};
    return{cls:speedLabel(gv)===speedLabel(tv)?'partial':'wrong',arrow:tv>gv?'↑':'↓'};
  }
  if(stat==='range'){
    if(gv===tv)return{cls:'correct',arrow:''};
    return{cls:rangeLabel(gv)===rangeLabel(tv)?'partial':'wrong',arrow:tv>gv?'↑':'↓'};
  }
  if(stat==='reload_speed'){
    if(gv===tv)return{cls:'correct',arrow:''};
    // Inverted: lower time = faster = arrow ↑
    return{cls:reloadLabel(gv)===reloadLabel(tv)?'partial':'wrong',arrow:tv<gv?'↑':'↓'};
  }
  return{cls:gv===tv?'correct':'wrong',arrow:tv>gv?'↑':tv<gv?'↓':''};
}

/* ── Path helpers ── */
// Strip "images/" prefix → file is at brawlername/atk.png etc.
function imgSrc(p){return p?p.replace(/^images\//,''):null}
// Strip "audio/" prefix → file is at brawlername/sound.ogg etc.
function audioSrc(p){return p?p.replace(/^audio\//,''):null}

/* ── Animation state ──
   classicAnimState.idx  = guessIdx currently animating (-1 = none)
   classicAnimState.done = true once the animation timer has fired    */
let classicAnimState = {idx:-1, done:true};

/* ── Victory effect ── */
function fireVictory(){
  // Remove existing overlay if any
  const old=document.getElementById('victory-overlay');
  if(old)old.remove();
  const fl=document.createElement('div');fl.className='flash-win';document.body.appendChild(fl);
  setTimeout(()=>fl.remove(),1000);

  // Gentle spin on body
  document.body.style.animation='gentleSpin 1.1s ease-in-out';
  setTimeout(()=>{document.body.style.animation=''},800);

  // Confetti
  const overlay=document.createElement('div');
  overlay.id='victory-overlay';document.body.appendChild(overlay);
  const colors=['#ffd000','#ff6b35','#27ae60','#3498db','#9b59b6','#e74c3c','#f1c40f','#00d2ff'];
  for(let i=0;i<90;i++){
    const c=document.createElement('div');
    c.className='confetti';
    c.style.cssText=`
      left:${Math.random()*100}%;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      width:${6+Math.random()*10}px;height:${6+Math.random()*10}px;
      border-radius:${Math.random()>.5?'50%':'2px'};
      animation-duration:${1.5+Math.random()*2.5}s;
      animation-delay:${Math.random()*0.8}s;
    `;
    overlay.appendChild(c);
  }
  setTimeout(()=>overlay.remove(),5000);
}

/* ── State ── */
const TODAY=new Date().toISOString().split('T')[0];
let ANSWERS={};  // filled after BRAWLERS loads
let S;
function loadState(){
  let raw=null;
  try{raw=JSON.parse(localStorage.getItem('brawldle_v3'))}catch(e){}
  if(!raw||raw.date!==TODAY){
    S={date:TODAY,activeMode:'classic',
      modes:Object.fromEntries(MODES.map(m=>[m,{guesses:[],won:false,gaveUp:false,wrong:0,hintsOn:true}]))};
  }else{
    S=raw;
    MODES.forEach(m=>{if(S.modes[m].hintsOn===undefined)S.modes[m].hintsOn=true});
  }
  let sr=null;
  try{sr=JSON.parse(localStorage.getItem('brawldle_streaks'))}catch(e){}
  S.streaks=sr||Object.fromEntries(MODES.map(m=>[m,{cur:0,best:0}]));
  MODES.forEach(m=>{if(!S.streaks[m])S.streaks[m]={cur:0,best:0}});
}
function saveState(){
  const{streaks,...save}=S;
  try{
    localStorage.setItem('brawldle_v3',JSON.stringify(save));
    localStorage.setItem('brawldle_streaks',JSON.stringify(S.streaks));
  }catch(e){}
}

function getNextMode(cur){
  const idx=MODES.indexOf(cur);
  for(let i=1;i<=MODES.length;i++){
    const m=MODES[(idx+i)%MODES.length];
    if(!S.modes[m].won&&!S.modes[m].gaveUp)return m;
  }
  return null;
}

function guess(mode,name){
  const ms=S.modes[mode];
  if(ms.won||ms.gaveUp)return;
  if(ms.guesses.some(g=>g.name===name))return;
  const correct=name===ANSWERS[mode];

  if(mode==='classic'){
    const gb=BRAWLERS[name],tb=BRAWLERS[ANSWERS[mode]];
    const cols=getDailyCols();
    const cmp={};
    cols.forEach(s=>{
      const gv=getStatValue(gb,s),tv=getStatValue(tb,s);
      cmp[s]=(gv!==null&&gv!==undefined&&tv!==null&&tv!==undefined)
        ?cmpStat(s,gv,tv):{cls:'wrong',arrow:''};
    });
    const newIdx=ms.guesses.length;
    ms.guesses.push({name,cmp});
    // Start animation for this row
    classicAnimState={idx:newIdx, done:false};
    // After all cells have revealed, mark done and re-render (shows banner, fires victory)
    const dur=(cols.length+1)*500+400;
    setTimeout(()=>{
      classicAnimState.done=true;
      if(correct)fireVictory();
      render();
    }, dur);
  } else {
    ms.guesses.push({name,correct});
    if(!correct)ms.wrong++;
    if(correct)setTimeout(fireVictory,120);
  }

  if(correct){
    ms.won=true;
    S.streaks[mode].cur++;
    if(S.streaks[mode].cur>S.streaks[mode].best)S.streaks[mode].best=S.streaks[mode].cur;
  }
  saveState();render();
}

function toggleHints(mode){S.modes[mode].hintsOn=!S.modes[mode].hintsOn;saveState();render()}
function switchMode(mode){S.activeMode=mode;render()}

/* ── HTML helpers ── */
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function searchBox(mode){
  const disabled=(S.modes[mode].won||S.modes[mode].gaveUp)?'disabled':'';
  return`<div class="search-wrap">
    <input id="inp-${mode}" class="search-input" ${disabled}
      type="text" autocomplete="off" placeholder="Search a brawler…"
      oninput="acFilter('${mode}')" onkeydown="acKey(event,'${mode}')">
    <div id="acdrop-${mode}" class="ac-list"></div>
  </div>`;
}
function guessList(mode){
  const ms=S.modes[mode];if(!ms.guesses.length)return'';
  return`<div class="guess-list">${ms.guesses.map(g=>
    `<div class="guess-item ${g.correct?'ok':'fail'}">${g.correct?'✅':'❌'} ${esc(g.name)}</div>`
  ).join('')}</div>`;
}
function winBanner(mode){
  const ms=S.modes[mode];
  // Hide banner while classic row is still animating
  if(mode==='classic'&&ms.won&&!classicAnimState.done)return'';
  const a=ANSWERS[mode];
  if(ms.won){
    const next=getNextMode(mode);
    const btn=next?`<button class="next-btn" onclick="switchMode('${next}')">Next Game → ${MODE_META[next].emoji} ${MODE_META[next].label}</button>`:'';
    return`<div class="banner banner-win"><h2>🎉 Correct!</h2>
      <p>The brawler was <strong>${esc(a)}</strong> — found in ${ms.guesses.length} guess${ms.guesses.length>1?'es':''}!</p>${btn}</div>`;
  }
  if(ms.gaveUp){
    const next=getNextMode(mode);
    const btn=next?`<button class="next-btn" onclick="switchMode('${next}')">Next Game → ${MODE_META[next].emoji} ${MODE_META[next].label}</button>`:'';
    return`<div class="banner banner-lose"><h2>😔 Game Over</h2>
      <p>The brawler was <strong>${esc(a)}</strong>.</p>${btn}</div>`;
  }
  return'';
}
function hintsToggleBtn(mode){
  const ms=S.modes[mode];if(ms.won||ms.gaveUp)return'';
  const on=ms.hintsOn;
  return`<div class="hints-bar"><button class="hints-toggle ${on?'on':''}" onclick="toggleHints('${mode}')">${on?'💡 Hints ON':'🙈 Hints OFF'}</button></div>`;
}

/* ── Classic ── */
function buildClassic(){
  const ms=S.modes.classic;
  const cols=getDailyCols();
  const rotCols=cols.slice(1).map(c=>COL_LABELS[c]||c);

  let h=`<div class="mode-header">
    <div class="mode-title">🔃 Classic</div>
    <div style="color:var(--text2);font-size:.8rem;font-weight:700">${ms.guesses.length} guess${ms.guesses.length!==1?'es':''}</div>
  </div>
  <div class="rotation-info">📊 Today's stats: <b>${rotCols.join('</b> · <b>')}</b></div>`;
  h+=winBanner('classic');
  h+=searchBox('classic');

  if(ms.guesses.length){
    const thCells=cols.map(s=>{
      const info=COL_INFO[s]?`<span class="info-btn" onmouseenter="tip(event,'${esc(s)}')" onmouseleave="untip()">i</span>`:'';
      return`<th>${COL_LABELS[s]||s}${info}</th>`;
    });

    const rows=ms.guesses.map((g,ri)=>{
      // Only animate the row that was just added and hasn't finished yet
      const doAnim=!classicAnimState.done&&classicAnimState.idx===ri;
      const tds=cols.map((s,ci)=>{
        const c=g.cmp[s];
        const bv=getStatValue(BRAWLERS[g.name],s);
        const disp=bv!==null&&bv!==undefined?fmt(s,bv):'—';
        const arr=c?.arrow||'';
        const bgArr=arr==='↑'?'▲':arr==='↓'?'▼':'';
        const inner=`<div class="cell-inner">${bgArr?`<span class="cell-bg-arr">${bgArr}</span>`:''}<span class="cell-txt">${esc(disp)}${arr?`<span class="cell-arrow">${arr}</span>`:''}</span></div>`;
        if(doAnim){
          const delay=(ci+1)*0.45;
          return`<td class="cell-anim cell-${c?c.cls:'wrong'}" style="animation-delay:${delay}s">${inner}</td>`;
        }
        return`<td class="cell-${c?c.cls:'wrong'}">${inner}</td>`;
      });
      const nameCls=doAnim?`class="cell-anim" style="animation-delay:0s"`:'';
      return`<tr><td ${nameCls}>${esc(g.name)}</td>${tds.join('')}</tr>`;
    });

    h+=`<div class="table-outer">
      <button class="scroll-btn sl" onclick="scrollTbl(-240)">‹</button>
      <div class="table-wrap" id="ctw">
        <table class="stats-table">
          <thead><tr><th>Brawler</th>${thCells.join('')}</tr></thead>
          <tbody>${rows.join('')}</tbody>
        </table>
      </div>
      <button class="scroll-btn sr" onclick="scrollTbl(240)">›</button>
    </div>`;
  }
  return h;
}

/* ── Fact ── */
function buildFact(){
  const ms=S.modes.fact;
  const a=ANSWERS.fact;
  const brawler=BRAWLERS[a];
  const facts=brawler.Fact||[];
  const raw=facts[dayIndex()%facts.length]||'';
  const text=raw.replace(/\*Brawler\*/g,
    ms.won||ms.gaveUp?`<span class="fact-revealed">${esc(a)}</span>`:'<span class="fact-unknown">???</span>'
  );
  const w=ms.wrong;
  const hints=ms.hintsOn?[
    {label:'Rarity',val:(brawler.Stats.rarity||'').replace(/_/g,' '),at:2},
    {label:'Class', val:(brawler.Stats.class||'').replace(/_/g,' '), at:4},
    {label:'Gender',val:brawler.Stats.gender||'',                     at:6},
  ].map(h=>`<span class="hint-pill ${w>=h.at?'shown':''}">${h.label}: ${w>=h.at?esc(h.val):'???'}</span>`).join(''):'';

  let html=`<div class="mode-header">
    <div class="mode-title">📖 Fact</div>
    ${w>0?`<div class="wrong-badge">❌ ${w} wrong</div>`:''}
  </div>`;
  html+=winBanner('fact');
  html+=`<div class="fact-card"><div class="fact-text">${text}</div>
    ${hints?`<div class="hints-row">${hints}</div>`:''}
  </div>`;
  html+=hintsToggleBtn('fact');
  html+=searchBox('fact');
  html+=guessList('fact');
  return html;
}

/* ── Voiceline ── */

/* ── Image ── */
function buildImage(){
  const ms=S.modes.image;
  const imgs=BRAWLERS[ANSWERS.image].Images||{};
  const w=ms.wrong;
  const showBoth=(w>=3||ms.won||ms.gaveUp)&&ms.hintsOn;
  const first=dayIndex()%2===0?'attack':'ultimate';
  const second=first==='attack'?'ultimate':'attack';
  const slot=(key)=>{
    const src=imgSrc(imgs[key]);
    if(!src)return`<div class="img-placeholder">No image</div>`;
    return pmImg(src,"ans-img","onerror=\"this.style.display='none';this.nextSibling&&(this.nextSibling.style.display='flex')\"") + `<div class="img-placeholder" style="display:none">🖼️ Not found<br><small></small></div>`;
  };
  let html=`<div class="mode-header">
    <div class="mode-title">🖼️ Image</div>
    ${w>0?`<div class="wrong-badge">❌ ${w} wrong</div>`:''}
  </div>`;
  html+=winBanner('image');
  html+=`<div class="img-card"><div class="img-grid ${showBoth?'two':'one'}">
    <div><div class="img-slot">${slot(first)}</div><div class="img-label">${first}</div></div>
    ${showBoth
      ?`<div><div class="img-slot">${slot(second)}</div><div class="img-label">${second}</div></div>`
      :ms.hintsOn&&!ms.won&&!ms.gaveUp
        ?`<div class="img-locked">🔒<br>${Math.max(0,3-w)} wrong to reveal 2nd image</div>`:''}
  </div></div>`;
  html+=hintsToggleBtn('image');
  html+=searchBox('image');
  html+=guessList('image');
  return html;
}

/* ── Render ── */
function render(){
  const dateStr=new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  const tabs=MODES.map(m=>{
    const done=S.modes[m].won||S.modes[m].gaveUp;
    const active=S.activeMode===m;
    const sk=S.streaks[m];
    return`<div class="tab${active?' active':''}${done?' done':''}" onclick="switchMode('${m}')">
      <span class="tab-shine"></span>
      <span class="tab-emoji">${MODE_META[m].emoji}</span>
      <span class="tab-label">${MODE_META[m].label}</span>
      ${sk.cur>0?`<span class="tab-streak">🔥${sk.cur}</span>`:''}
    </div>`;
  }).join('');

  let content='';
  switch(S.activeMode){
    case'classic':   content=buildClassic();break;
    case'fact':      content=buildFact();break;
    case'voiceline': content=buildVoiceline();break;
    case'emoji':     content=buildEmoji();break;
    case'image':     content=buildImage();break;
  }
  document.getElementById('app').innerHTML=`
    <div class="header">
      <div class="header-logo">⚡ BRAWLDLE</div>
      <div class="header-sub">${esc(dateStr)}</div>
    </div>
    <div class="tabs">${tabs}</div>
    <div class="game-area">${content}</div>
    <div id="tooltip"></div>
    <div class="report-btn" onclick="copyEmail()" title="Click to copy email">⚠</div>
    <div class="report-tip">Found a bug or an issue? Contact me at:<br><b style="color:var(--text)">brawlstarsdle.dukook@gmail.com</b></div>`;
  resolveMedia();
}

/* ── Autocomplete ── */
function acFilter(mode){
  const inp=document.getElementById('inp-'+mode),drop=document.getElementById('acdrop-'+mode);
  if(!inp||!drop)return;
  const q=inp.value.toLowerCase().trim();
  const used=new Set(S.modes[mode].guesses.map(g=>g.name));
  const pool=Object.keys(BRAWLERS).filter(b=>!used.has(b));
  if(!q){drop.classList.remove('open');drop.innerHTML='';return}
  const matches=pool.filter(b=>b.toLowerCase().includes(q)).slice(0,10);
  if(!matches.length){drop.classList.remove('open');return}
  drop.innerHTML=matches.map(b=>`<div class="ac-item" data-name="${esc(b)}" onmousedown="pick('${mode}',this)">${esc(b)}</div>`).join('');
  drop.classList.add('open');
}
function acKey(e,mode){
  const drop=document.getElementById('acdrop-'+mode);if(!drop)return;
  const items=drop.querySelectorAll('.ac-item'),hi=drop.querySelector('.hi');
  if(e.key==='ArrowDown'){e.preventDefault();if(!hi)items[0]?.classList.add('hi');else{hi.classList.remove('hi');(hi.nextElementSibling||items[0]).classList.add('hi')}}
  else if(e.key==='ArrowUp'){e.preventDefault();if(!hi)items[items.length-1]?.classList.add('hi');else{hi.classList.remove('hi');(hi.previousElementSibling||items[items.length-1]).classList.add('hi')}}
  else if(e.key==='Enter'){e.preventDefault();const c=hi||(items.length===1?items[0]:null);if(c)doGuess(mode,c.dataset.name)}
  else if(e.key==='Escape')drop.classList.remove('open');
}
function pick(mode,el){doGuess(mode,el.dataset.name)}
function doGuess(mode,name){
  const inp=document.getElementById('inp-'+mode);if(inp)inp.value='';
  const drop=document.getElementById('acdrop-'+mode);if(drop){drop.classList.remove('open');drop.innerHTML=''}
  guess(mode,name);
}
/* ── Protected Media: paths never appear in HTML, set via JS only ── */
const _PM={};let _pmc=0;
function pmImg(src,cls='',style=''){
  const id='pm'+(++_pmc);_PM[id]=src;
  return `<img class="${cls}" data-pmid="${id}" alt="" style="${style}">`;
}
function pmAudio(src){
  const id='pm'+(++_pmc);_PM[id]=src;
  return `<audio controls data-pmid="${id}"></audio>`;
}
function resolveMedia(){
  document.querySelectorAll('[data-pmid]').forEach(el=>{
    el.src=_PM[el.dataset.pmid]||'';
    el.removeAttribute('data-pmid');
  });
}
function scrollTbl(d){const w=document.getElementById('ctw');if(w)w.scrollBy({left:d,behavior:'smooth'})}

function copyEmail(){
  const email='brawlstarsdle.dukook@gmail.com';
  navigator.clipboard.writeText(email).then(()=>{
    const btn=document.querySelector('.report-btn');
    if(!btn)return;
    btn.textContent='✓';btn.style.color='var(--green)';btn.style.borderColor='var(--green)';
    setTimeout(()=>{btn.textContent='⚠';btn.style.color='';btn.style.borderColor='';},1800);
  }).catch(()=>{
    // Fallback for older browsers
    const ta=document.createElement('textarea');
    ta.value=email;ta.style.position='fixed';ta.style.opacity='0';
    document.body.appendChild(ta);ta.select();document.execCommand('copy');
    document.body.removeChild(ta);
    const btn=document.querySelector('.report-btn');
    if(btn){btn.textContent='✓';btn.style.color='var(--green)';setTimeout(()=>{btn.textContent='⚠';btn.style.color='';},1800);}
  });
}

/* ── Tooltip ── */
function tip(e,stat){
  const t=document.getElementById('tooltip'),info=COL_INFO[stat];if(!t||!info)return;
  t.textContent=info;t.style.display='block';
  t.style.left=Math.min(e.clientX+12,window.innerWidth-295)+'px';
  t.style.top=Math.max(e.clientY-60,8)+'px';
}
function untip(){const t=document.getElementById('tooltip');if(t)t.style.display='none'}

document.addEventListener('click',e=>{
  MODES.forEach(m=>{
    const drop=document.getElementById('acdrop-'+m),inp=document.getElementById('inp-'+m);
    if(drop&&inp&&!drop.contains(e.target)&&e.target!==inp)drop.classList.remove('open');
  });
});
